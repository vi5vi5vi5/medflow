<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>MedFlow — Администратор поликлиники</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:          #f4f6f1;
    --bg-elev:     #ffffff;
    --bg-soft:     #eaefe5;
    --bg-tint:     #e4ecdf;
    --line:        #d7ddd0;
    --line-soft:   #e6ebdf;
    --ink:         #1f2a24;
    --ink-2:       #47564e;
    --ink-3:       #7a8a80;
    --ink-4:       #a5b0a6;
    --accent:      #2d4a3e;
    --accent-ink:  #f4f6f1;
    --accent-soft: #cddbcd;
    --accent-tint: #e2ecdf;
    --warn:        #b5894b;
    --warn-soft:   #f2e7d2;
    --danger:      #a0493d;
    --danger-soft: #f3dcd6;
    --info:        #527a7b;
    --info-soft:   #d9e6e3;
    --radius:      8px;
    --radius-sm:   5px;
    --radius-lg:   12px;
  }
  [data-theme="dark"] {
    --bg:          #141a17;
    --bg-elev:     #1b231e;
    --bg-soft:     #1f2924;
    --bg-tint:     #243029;
    --line:        #2d3a32;
    --line-soft:   #253029;
    --ink:         #e7ece6;
    --ink-2:       #b6c1b9;
    --ink-3:       #849185;
    --ink-4:       #5d6962;
    --accent:      #8fb89c;
    --accent-ink:  #0f1513;
    --accent-soft: #2a3b31;
    --accent-tint: #1e2a23;
    --warn:        #d4b07a;
    --warn-soft:   #3a2f1e;
    --danger:      #d18577;
    --danger-soft: #3a241f;
    --info:        #8eb5b3;
    --info-soft:   #1f2c2c;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: "Inter Tight", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: "JetBrains Mono", ui-monospace, monospace; font-feature-settings: "tnum"; }

  /* ── layout ── */
  .app { display: grid; grid-template-columns: 224px 1fr; height: 100vh; overflow: hidden; }
  .sidebar {
    background: var(--bg-tint);
    border-right: 1px solid var(--line);
    padding: 14px 10px;
    display: flex; flex-direction: column; gap: 2px;
    overflow-y: auto;
  }
  .brand { display: flex; align-items: center; gap: 10px; padding: 4px 8px 14px 8px; font-weight: 700; letter-spacing: -0.02em; font-size: 15px; }
  .brand-mark { width: 28px; height: 28px; border-radius: 7px; background: var(--accent); color: var(--accent-ink); display: grid; place-items: center; font-family: "JetBrains Mono", monospace; font-weight: 700; font-size: 13px; flex-shrink: 0; }
  .clinic-info { margin: 0 4px 10px; padding: 9px 11px; background: var(--bg-elev); border: 1px solid var(--line-soft); border-radius: var(--radius-sm); }
  .clinic-info .ci-label { font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.06em; }
  .clinic-info .ci-name { font-weight: 500; font-size: 13px; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .clinic-info .ci-addr { font-size: 11px; color: var(--ink-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .side-label { font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.08em; margin: 10px 10px 3px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: var(--radius-sm); color: var(--ink-2); cursor: pointer; font-size: 13px; user-select: none; }
  .nav-item:hover { background: var(--bg-soft); color: var(--ink); }
  .nav-item.active { background: var(--accent); color: var(--accent-ink); }
  .nav-item .ico { width: 16px; height: 16px; flex-shrink: 0; display: grid; place-items: center; }
  .nav-item .ico svg { width: 100%; height: 100%; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
  .nav-item .cnt { margin-left: auto; font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--ink-3); background: var(--bg-elev); padding: 1px 6px; border-radius: 4px; }
  .nav-item.active .cnt { background: rgba(255,255,255,.15); color: var(--accent-ink); }
  .sidebar-foot { margin-top: auto; padding: 10px 10px 4px; border-top: 1px solid var(--line-soft); display: flex; align-items: center; gap: 10px; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent-soft); color: var(--accent); display: grid; place-items: center; font-weight: 600; font-size: 11px; flex-shrink: 0; font-family: "JetBrains Mono", monospace; }
  .who { font-size: 12.5px; font-weight: 500; }
  .role-badge { font-size: 11px; color: var(--ink-3); }

  /* ── content ── */
  .content { display: flex; flex-direction: column; overflow: hidden; }
  .topbar { display: flex; align-items: center; gap: 12px; padding: 10px 22px; border-bottom: 1px solid var(--line); background: var(--bg-elev); flex-shrink: 0; }
  .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--ink-3); }
  .breadcrumb .sep { color: var(--ink-4); }
  .breadcrumb .here { color: var(--ink); font-weight: 500; }
  .search { display: flex; align-items: center; gap: 8px; background: var(--bg-soft); border: 1px solid var(--line-soft); border-radius: var(--radius-sm); padding: 6px 10px; color: var(--ink-3); font-size: 13px; max-width: 320px; flex: 1; }
  .search svg { flex-shrink: 0; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .icon-btn { width: 30px; height: 30px; display: grid; place-items: center; border-radius: var(--radius-sm); color: var(--ink-2); cursor: pointer; border: 1px solid transparent; background: transparent; flex-shrink: 0; }
  .icon-btn:hover { background: var(--bg-soft); }
  .btn { font: inherit; cursor: pointer; padding: 6px 12px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; border: 1px solid transparent; white-space: nowrap; }
  .btn.primary { background: var(--accent); color: var(--accent-ink); }
  .btn.primary:hover { opacity: 0.88; }
  .btn.ghost { background: transparent; color: var(--ink-2); border-color: var(--line); }
  .btn.ghost:hover { background: var(--bg-soft); color: var(--ink); }
  .btn.danger { background: var(--danger-soft); color: var(--danger); border-color: transparent; }
  .btn.danger:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .scroll-area { flex: 1; overflow-y: auto; }

  /* ── main content ── */
  .main { padding: 22px; }
  .page-head { display: flex; align-items: flex-end; gap: 14px; margin-bottom: 18px; }
  .page-head h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.025em; }
  .page-head .page-sub { color: var(--ink-3); font-size: 13px; }
  .page-head .head-actions { margin-left: auto; display: flex; gap: 8px; }

  .stat-grid { display: grid; gap: 12px; margin-bottom: 18px; }
  .stat { background: var(--bg-elev); border: 1px solid var(--line-soft); border-radius: var(--radius); padding: 14px; }
  .stat .label { color: var(--ink-3); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }
  .stat .num { font-family: "JetBrains Mono", monospace; font-weight: 600; font-size: 26px; letter-spacing: -0.02em; color: var(--ink); margin-top: 4px; }
  .stat.highlight { background: var(--accent-tint); border-color: var(--accent-soft); }

  .card { background: var(--bg-elev); border: 1px solid var(--line-soft); border-radius: var(--radius); }
  .card-head { padding: 11px 14px; border-bottom: 1px solid var(--line-soft); display: flex; align-items: center; gap: 10px; }
  .card-head h3 { margin: 0; font-size: 13.5px; font-weight: 600; }
  .card-head .head-note { font-size: 12px; color: var(--ink-3); }
  .card-head .tail { margin-left: auto; display: flex; gap: 6px; align-items: center; }
  .card-body { padding: 12px 14px; }
  .two-col { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; }
  .detail { display: grid; grid-template-columns: 1fr 360px; gap: 12px; }

  /* ── table ── */
  table.list { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.list th { text-align: left; font-weight: 500; color: var(--ink-3); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; padding: 9px 12px; border-bottom: 1px solid var(--line-soft); }
  table.list td { padding: 10px 12px; border-bottom: 1px solid var(--line-soft); vertical-align: middle; }
  table.list tr:hover td { background: var(--bg-soft); cursor: pointer; }
  table.list tr:last-child td { border-bottom: none; }
  .cell-name { display: flex; align-items: center; gap: 10px; }

  /* ── tags ── */
  .tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500; background: var(--bg-soft); color: var(--ink-2); border: 1px solid var(--line-soft); }
  .tag.dot::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
  .tag.ok    { background: var(--accent-tint); color: var(--accent);  border-color: var(--accent-soft); }
  .tag.warn  { background: var(--warn-soft);   color: var(--warn);   border-color: transparent; }
  .tag.err   { background: var(--danger-soft); color: var(--danger); border-color: transparent; }
  .tag.info  { background: var(--info-soft);   color: var(--info);   border-color: transparent; }

  /* ── chips ── */
  .chip { padding: 4px 10px; border-radius: 999px; font-size: 12px; background: var(--bg-soft); color: var(--ink-2); border: 1px solid var(--line-soft); cursor: pointer; user-select: none; }
  .chip.on { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; }

  /* ── mini calendar ── */
  .mini-cal { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .mini-cal .dow { font-size: 10px; color: var(--ink-3); text-align: center; text-transform: uppercase; letter-spacing: 0.05em; padding: 4px 0; }
  .mini-cal .d { aspect-ratio: 1; display: grid; place-items: center; font-family: "JetBrains Mono", monospace; font-size: 12px; color: var(--ink-2); border-radius: 5px; cursor: pointer; position: relative; }
  .mini-cal .d:hover { background: var(--bg-soft); }
  .mini-cal .d.mute { color: var(--ink-4); }
  .mini-cal .d.today { background: var(--accent); color: var(--accent-ink); font-weight: 600; }
  .mini-cal .d.has::after { content: ""; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }
  .mini-cal .d.today.has::after { background: var(--accent-ink); }

  /* ── calendar (day) ── */
  .cal-page { height: 100%; display: flex; flex-direction: column; }
  .cal-nav  { padding: 14px 22px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid var(--line-soft); background: var(--bg-elev); flex-shrink: 0; }
  .cal-scroll { flex: 1 1 0; min-height: 0; overflow: auto; position: relative; background: var(--bg); }
  .cal-rows  { display: flex; flex-direction: column; width: max-content; min-width: 100%; }
  .cal-row-head { display: flex; position: sticky; top: 0; z-index: 5; background: var(--bg-soft); border-bottom: 1px solid var(--line); }
  .cal-row-body { display: flex; position: relative; }
  .doc-head {
    box-sizing: border-box; padding: 8px 10px;
    border-right: 1px solid var(--line-soft);
    background: var(--bg-soft);
    display: flex; align-items: center; gap: 8px; font-size: 12.5px;
    flex-shrink: 0;
  }
  .specialty { color: var(--ink-3); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .doc-room { margin-left: auto; font-family: "JetBrains Mono", monospace; font-size: 11px; padding: 1px 6px; background: var(--bg-elev); border-radius: 3px; color: var(--ink-3); border: 1px solid var(--line-soft); flex-shrink: 0; }
  .doc-col {
    position: relative; flex-shrink: 0;
    background: var(--line);
    border-right: 1px solid var(--line-soft);
    overflow: hidden;
  }
  [data-theme="dark"] .doc-col { background: #0c100e; }
  .time-col {
    position: relative; flex-shrink: 0;
    background: var(--bg);
    border-right: 1px solid var(--line);
  }
  .time-label {
    position: absolute; right: 6px;
    font-family: "JetBrains Mono", monospace; font-size: 11px;
    color: var(--ink-3); transform: translateY(-50%); pointer-events: none;
  }
  .work-window {
    position: absolute; left: 0; right: 0;
    background: var(--bg-elev);
    cursor: pointer; transition: background .15s;
  }
  .work-window:hover { background: var(--accent-tint); }
  .hour-line {
    position: absolute; left: 0; right: 0; height: 1px;
    background: var(--line-soft); pointer-events: none;
  }
  .half-line {
    position: absolute; left: 0; right: 0; height: 1px;
    background: var(--line-soft); opacity: 0.45;
    pointer-events: none;
    background-image: repeating-linear-gradient(90deg, var(--line-soft) 0, var(--line-soft) 4px, transparent 4px, transparent 8px);
    background-color: transparent;
  }
  .time-label-half {
    font-size: 9.5px;
    color: var(--ink-4);
  }
  .appt {
    position: absolute; left: 3px; right: 3px;
    background: var(--accent-tint); color: var(--accent);
    border: 1px solid var(--accent-soft); border-left: 3px solid var(--accent);
    border-radius: 4px; padding: 3px 7px; font-size: 11.5px;
    overflow: hidden; cursor: pointer;
    box-sizing: border-box;
  }
  .appt.warn { background: var(--warn-soft); color: var(--warn); border-color: transparent; border-left-color: var(--warn); }
  .appt.info { background: var(--info-soft); color: var(--info); border-color: transparent; border-left-color: var(--info); }
  .appt.err  { background: var(--danger-soft); color: var(--danger); border-color: transparent; border-left-color: var(--danger); }
  .appt.cancelled { opacity: 0.5; }
  .appt.cancelled .pname { text-decoration: line-through; }
  .pname { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ptime { font-family: "JetBrains Mono", monospace; font-size: 10px; opacity: 0.8; }

  /* ── detail panel ── */
  .detail-tabs { display: flex; gap: 2px; padding: 10px 14px 0; border-bottom: 1px solid var(--line-soft); }
  .detail-tab { padding: 6px 12px; border-bottom: 2px solid transparent; font-size: 13px; color: var(--ink-3); cursor: pointer; white-space: nowrap; }
  .detail-tab.on { color: var(--ink); border-bottom-color: var(--accent); font-weight: 500; }
  .detail-close { display: none; }
  .detail-scrim { display: none; }
  @keyframes detailSheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes detailScrimIn { from { opacity: 0; } to { opacity: 1; } }

  /* ── timeline ── */
  .timeline { position: relative; padding-left: 22px; }
  .timeline::before { content: ""; position: absolute; left: 6px; top: 6px; bottom: 6px; width: 1px; background: var(--line); }
  .timeline .tl-item { position: relative; padding-bottom: 14px; }
  .timeline .tl-item::before { content: ""; position: absolute; left: -20px; top: 6px; width: 9px; height: 9px; border-radius: 50%; background: var(--bg-elev); border: 2px solid var(--accent); }
  .timeline .tl-date { font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--ink-3); }
  .timeline .tl-title { font-weight: 500; font-size: 13px; margin: 2px 0; }
  .timeline .tl-note { font-size: 12px; color: var(--ink-2); padding: 7px 10px; background: var(--bg-soft); border-radius: 5px; margin-top: 4px; }

  /* ── steps (wizard) ── */
  .steps { display: flex; align-items: center; margin-bottom: 22px; flex-wrap: wrap; gap: 4px; }
  .step { display: flex; align-items: center; gap: 8px; color: var(--ink-3); font-size: 13px; }
  .step .n { width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--line); display: grid; place-items: center; font-family: "JetBrains Mono", monospace; font-size: 11px; background: var(--bg-elev); flex-shrink: 0; }
  .step.done { color: var(--accent); }
  .step.done .n { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .step.cur { color: var(--ink); font-weight: 500; }
  .step.cur .n { border-color: var(--accent); color: var(--accent); }
  .line { height: 1px; flex: 0 0 28px; background: var(--line); margin: 0 8px; }
  .line.on { background: var(--accent); }

  /* ── form ── */
  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
  .field label { font-size: 12px; color: var(--ink-2); font-weight: 500; }
  .field .hint { font-size: 11px; color: var(--ink-3); }
  .input-el {
    background: var(--bg-elev); border: 1px solid var(--line);
    border-radius: var(--radius-sm); padding: 7px 10px;
    font: inherit; font-size: 13px; color: var(--ink);
    outline: none; transition: border-color .15s; width: 100%;
  }
  .input-el:focus { border-color: var(--accent); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  /* ── search inside card ── */
  .search input { border: none; background: transparent; font: inherit; font-size: 13px; outline: none; flex: 1; color: var(--ink); }
  .search input::placeholder { color: var(--ink-3); }

  /* ── modal ── */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(15,20,18,0.45); backdrop-filter: blur(3px); display: grid; place-items: center; z-index: 100; padding: 24px; }
  .modal-box { background: var(--bg-elev); border-radius: var(--radius-lg); box-shadow: 0 24px 60px rgba(0,0,0,0.2); overflow: hidden; width: 100%; max-height: calc(100vh - 48px); display: flex; flex-direction: column; }
  .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--line-soft); flex-shrink: 0; }
  .modal-title { font-weight: 600; font-size: 14px; }
  .modal-body { padding: 18px; overflow-y: auto; flex: 1 1 auto; min-height: 0; }

  /* ── toast ── */
  .toast { position: fixed; bottom: 24px; right: 24px; z-index: 200; padding: 10px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); animation: toast-in .2s ease; }
  .toast.ok  { background: var(--accent-tint); color: var(--accent); border: 1px solid var(--accent-soft); }
  .toast.err { background: var(--danger-soft); color: var(--danger); border: 1px solid transparent; }
  @keyframes toast-in { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

  /* ── theme toggle ── */
  .theme-toggle { font: inherit; background: var(--bg-elev); border: 1px solid var(--line); color: var(--ink-2); padding: 5px 11px; border-radius: 999px; cursor: pointer; font-size: 12px; display: inline-flex; align-items: center; gap: 7px; }
  .theme-toggle:hover { background: var(--bg-soft); }
  .tgl { width: 26px; height: 15px; border-radius: 999px; background: var(--line); position: relative; transition: background .2s; }
  .tgl::after { content: ""; position: absolute; top: 2px; left: 2px; width: 11px; height: 11px; border-radius: 50%; background: var(--bg-elev); transition: left .2s; }
  [data-theme="dark"] .tgl { background: var(--accent); }
  [data-theme="dark"] .tgl::after { left: 13px; background: var(--accent-ink); }

  /* connection banner */
  .conn-banner { background: var(--warn-soft); border-bottom: 1px solid var(--warn); padding: 7px 22px; font-size: 12px; color: var(--warn); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  /* ── appointment modal helpers ── */
  .appt-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .quick-form { display: flex; flex-direction: column; }
  .quick-hint { font-size: 12px; color: var(--ink-3); padding: 5px 0; }
  .hamburger { display: none; }

  /* ─────────────── MOBILE / TABLET ─────────────── */
  @media (max-width: 768px) {
    .app { grid-template-columns: 1fr; }
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 272px; max-width: 84vw; z-index: 130;
      transform: translateX(-100%); transition: transform .25s ease;
    }
    .sidebar.open { transform: translateX(0); box-shadow: 6px 0 30px rgba(0,0,0,.32); }
    .nav-backdrop { position: fixed; inset: 0; background: rgba(15,20,18,.45); z-index: 120; }
    .hamburger { display: grid; }

    .topbar { padding: 9px 12px; gap: 8px; }
    .breadcrumb > span:not(.here) { display: none; }
    .topbar-right { gap: 6px; margin-left: auto; }
    .theme-toggle > span:last-child { display: none; }
    .topbar-right .btn.primary { padding: 6px 11px; }

    .main { padding: 14px; }
    .page-head { flex-wrap: wrap; align-items: flex-start; }
    .page-head h1 { font-size: 19px; }
    .page-head .page-sub { font-size: 12px; }
    .page-head .head-actions { margin-left: 0; width: 100%; }
    .page-head .head-actions .btn { flex: 1; justify-content: center; }

    .stat-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .two-col { grid-template-columns: 1fr; }
    .detail { grid-template-columns: 1fr; }
    /* Детали человека на мобильном — полноэкранное окно поверх списка,
       а не панель внизу (иначе при тысячах записей пришлось бы листать до низа) */
    .detail-empty { display: none !important; }
    .detail-scrim {
      display: block;
      position: fixed; inset: 0; z-index: 79;
      background: rgba(15,20,18,0.45);
      backdrop-filter: blur(2px);
      animation: detailScrimIn .22s ease;
    }
    .detail-panel {
      position: fixed; left: 0; right: 0; bottom: 0; top: auto; z-index: 80;
      margin: 0; border: none;
      border-radius: 16px 16px 0 0;
      max-height: 88vh;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      box-shadow: 0 -12px 40px rgba(0,0,0,0.28);
      animation: detailSheetUp .3s cubic-bezier(.32,.72,0,1);
    }
    /* полоска-хват сверху как у обычных bottom sheet */
    .detail-panel::before {
      content: ""; display: block;
      width: 36px; height: 4px; margin: 8px auto 2px;
      border-radius: 999px; background: var(--line);
    }
    .detail-panel > div:first-child {
      position: sticky; top: 0; z-index: 2;
      background: var(--bg-elev);
    }
    .detail-close { display: inline-flex; flex-shrink: 0; font-size: 18px; }
    .row2, .row3 { grid-template-columns: 1fr; }

    table.list th, table.list td { padding: 9px 8px; }

    .cal-nav { padding: 10px 12px; flex-wrap: wrap; gap: 8px 12px; }
    .cal-legend { display: none !important; }

    .modal-backdrop { padding: 10px; }
    .modal-box { width: 100% !important; max-width: 100%; max-height: calc(100vh - 20px); }
    .steps { gap: 2px 4px; }
    .step { font-size: 12px; }
  }

  @media (max-width: 430px) {
    .page-head .head-actions { flex-direction: column; }
    .step .n { width: 20px; height: 20px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
// clinic-views.jsx — section views for MedFlow Clinic admin
// Exports all view components + modals to window

const API = '/api';
const apiFetch = async (path, opts = {}) => {
  const res = await fetch(API + path, opts);
  const json = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
  return json;
};
const apiGet = p => apiFetch(p);
const apiPost = (p, b) => apiFetch(p, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(b) });
const apiPatch = (p, b) => apiFetch(p, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(b) });
const apiDelete = p => apiFetch(p, { method: 'DELETE' });

// ── tiny helpers ──────────────────────────────────────────────────────────────
const DAYS = ['','Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const STATUS_LABEL = ['Запланирована','Завершена','Отменена'];
const STATUS_TAG   = ['ok','info','err'];
const GENDER_LABEL = ['Жен.','Муж.','—'];

function fmtDate(s) {
  if (!s) return '—';
  const [y,m,d] = s.split('-');
  return `${d}.${m}.${y}`;
}
function ageOf(b, today) {
  if (!b || !today) return '';
  const now = new Date(today + 'T00:00:00');
  const bd = new Date(b);
  let a = now.getFullYear() - bd.getFullYear();
  if (now < new Date(now.getFullYear(), bd.getMonth(), bd.getDate())) a--;
  return a + ' лет';
}
function initials(p) {
  if (!p) return '??';
  return ((p.last_name||'')[0]||'') + ((p.first_name||'')[0]||'');
}
function fullName(p) {
  if (!p) return '—';
  return [p.last_name, p.first_name, p.middle_name].filter(Boolean).join(' ');
}
function shortName(p) {
  if (!p) return '—';
  const i = n => n ? n[0]+'.' : '';
  return `${p.last_name||''} ${i(p.first_name)}${i(p.middle_name)}`.trim();
}

// ── shared micro-components ───────────────────────────────────────────────────
function Av({ p, size = 28, fs = 10 }) {
  return <span className="avatar" style={{ width: size, height: size, fontSize: fs }}>{initials(p)}</span>;
}
function Tag({ type, children }) {
  return <span className={`tag dot ${type || ''}`}>{children}</span>;
}
function Spinner() {
  return <div style={{ padding: 40, textAlign: 'center', color: 'var(--ink-3)', fontSize: 13 }}>Загрузка…</div>;
}
function Empty({ text }) {
  return <div style={{ padding: 40, textAlign: 'center', color: 'var(--ink-3)', fontSize: 13 }}>{text}</div>;
}
function Modal({ title, onClose, children, width = 480 }) {
  React.useEffect(() => {
    const h = e => e.key === 'Escape' && onClose();
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);
  return (
    <div className="modal-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-box" style={{ width }}>
        <div className="modal-head">
          <span className="modal-title">{title}</span>
          <button className="icon-btn" onClick={onClose}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <div className="modal-body">{children}</div>
      </div>
    </div>
  );
}
function ConfirmModal({ text, onConfirm, onClose }) {
  return (
    <Modal title="Подтверждение" onClose={onClose} width={360}>
      <p style={{ color: 'var(--ink-2)', fontSize: 14, marginBottom: 20 }}>{text}</p>
      <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
        <button className="btn ghost" onClick={onClose}>Отмена</button>
        <button className="btn danger" onClick={onConfirm}>Удалить</button>
      </div>
    </Modal>
  );
}
function Field({ label, hint, children }) {
  return (
    <div className="field">
      <label>{label}</label>
      {children}
      {hint && <div className="hint">{hint}</div>}
    </div>
  );
}
function Input(props) {
  return <input className="input-el" {...props} />;
}
function Select({ children, ...props }) {
  return <select className="input-el" {...props}>{children}</select>;
}

// ── DASHBOARD VIEW ────────────────────────────────────────────────────────────
function DashboardView({ clinicId, clinic, patients, doctors, rooms, appointments, schedules, specs, today, onNavigate, onNewAppt, toast }) {
  const todayAppts = appointments.filter(a => a.scheduledAt && a.scheduledAt.startsWith(today) && a.status !== 2)
    .sort((a, b) => a.scheduledAt.localeCompare(b.scheduledAt));
  const doctorMap = Object.fromEntries(doctors.map(d => [d.id, d]));
  const patientMap = Object.fromEntries(patients.map(p => [p.id, p]));
  const specMap = Object.fromEntries(specs.map(s => [s.id, s]));

  const stats = [
    { label: 'Записей сегодня', value: todayAppts.length, hi: true },
    { label: 'Пациентов', value: patients.length },
    { label: 'Врачей', value: doctors.length },
    { label: 'Кабинетов', value: rooms.length },
  ];

  // mini calendar for the current month
  const [yStr, mStr] = today.split('-');
  const year  = parseInt(yStr, 10);
  const month = parseInt(mStr, 10);            // 1..12
  const todayDay = parseInt(today.slice(8,10), 10);
  const firstDow = (() => {                    // Mon=1..Sun=7
    const j = new Date(`${yStr}-${mStr}-01T00:00:00`).getDay();
    return j === 0 ? 7 : j;
  })();
  const daysInMonth = new Date(year, month, 0).getDate();
  const prevMonthDays = new Date(year, month - 1, 0).getDate();
  const calDays = [];
  for (let i = firstDow - 1; i > 0; i--) calDays.push({ n: prevMonthDays - i + 1, mute: true });
  const apptDates = new Set(appointments.filter(a=>a.status!==2).map(a=>a.scheduledAt&&a.scheduledAt.slice(0,10)));
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${yStr}-${mStr}-${String(d).padStart(2,'0')}`;
    calDays.push({ n: d, today: d === todayDay, has: apptDates.has(ds) });
  }
  let fill = 1;
  while (calDays.length < 42 && calDays.length % 7 !== 0) calDays.push({ n: fill++, mute: true });
  while (calDays.length < 35) calDays.push({ n: fill++, mute: true });

  const DOW_LONG  = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
  const MONTHS_NOM = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const todayDateObj = new Date(today + 'T00:00:00');
  const subTitle = `${DOW_LONG[todayDateObj.getDay()]}, ${todayDay} ${MONTH_GEN[month - 1]} ${year}`;
  const monthTitle = `${MONTHS_NOM[month - 1]} ${year}`;

  return (
    <div className="main">
      <div className="page-head">
        <div>
          <h1>Дашборд</h1>
          <div className="page-sub">{subTitle} · {clinic?.name || '—'}</div>
        </div>
        <div className="head-actions">
          <button className="btn primary" onClick={onNewAppt}>+ Новая запись</button>
        </div>
      </div>

      <div className="stat-grid" style={{ gridTemplateColumns: 'repeat(4,1fr)' }}>
        {stats.map(s => (
          <div key={s.label} className={`stat${s.hi ? ' highlight' : ''}`}>
            <span className="label">{s.label}</span>
            <div className="num">{s.value}</div>
          </div>
        ))}
      </div>

      <div className="two-col">
        <div className="card">
          <div className="card-head">
            <h3>Записи на сегодня</h3>
            <span className="head-note">{today}</span>
            <div className="tail">
              <button className="btn ghost" style={{ padding: '4px 10px' }} onClick={() => onNavigate('calendar')}>Расписание →</button>
            </div>
          </div>
          {todayAppts.length === 0
            ? <Empty text="Записей на сегодня нет" />
            : (
              <table className="list">
                <thead><tr><th>Время</th><th>Пациент</th><th>Врач</th><th>Статус</th></tr></thead>
                <tbody>
                  {todayAppts.slice(0, 8).map(a => {
                    const doc = doctorMap[a.doctorId];
                    const pat = patientMap[a.patientId];
                    return (
                      <tr key={a.id}>
                        <td className="mono">{a.scheduledAt?.slice(11)}</td>
                        <td className="cell-name"><Av p={pat} />{shortName(pat)}</td>
                        <td style={{ fontSize: 12.5 }}>{shortName(doc)}</td>
                        <td><Tag type={STATUS_TAG[a.status]}>{STATUS_LABEL[a.status]}</Tag></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            )
          }
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          <div className="card">
            <div className="card-head"><h3>{monthTitle}</h3></div>
            <div className="card-body">
              <div className="mini-cal">
                {['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d => <div key={d} className="dow">{d}</div>)}
                {calDays.map((d, i) => (
                  <div key={i} className={`d${d.mute?' mute':''}${d.today?' today':''}${d.has?' has':''}`}>{d.n}</div>
                ))}
              </div>
            </div>
          </div>

          <div className="card">
            <div className="card-head"><h3>Быстрые действия</h3></div>
            <div className="card-body" style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {[
                { label: '+ Новая запись',    fn: onNewAppt },
                { label: '+ Добавить пациента', fn: () => onNavigate('patients') },
                { label: '+ Добавить врача',    fn: () => onNavigate('doctors') },
                { label: '+ Добавить кабинет',  fn: () => onNavigate('rooms') },
              ].map(q => (
                <button key={q.label} className="btn ghost" style={{ justifyContent: 'flex-start' }} onClick={q.fn}>{q.label}</button>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── CALENDAR VIEW (by doctor columns, с навигацией по дням) ───────────────────
const MONTH_GEN = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const DOW_SHORT = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
function addDays(isoDate, delta) {
  const [y, m, d] = isoDate.split('-').map(Number);
  const dt = new Date(Date.UTC(y, m - 1, d));
  dt.setUTCDate(dt.getUTCDate() + delta);
  return dt.toISOString().slice(0, 10);
}
function dowApp(isoDate) {
  // JS: Sun=0..Sat=6 → наша схема Пн=1..Вс=7
  const j = new Date(isoDate + 'T00:00:00').getDay();
  return j === 0 ? 7 : j;
}
function fmtDateLong(isoDate) {
  const d = new Date(isoDate + 'T00:00:00');
  return `${DOW_SHORT[d.getDay()]}, ${d.getDate()} ${MONTH_GEN[d.getMonth()]} ${d.getFullYear()}`;
}

// Расписание: 2 минуты = 1px по вертикали. Шкала от 00:00 до 24:00 = 2880px.
const PXM = 2;
const DAY_H = 24 * 60 * PXM;
const TIME_W = 60;     // ширина колонки часов
const COL_W  = 220;    // фиксированная ширина колонки врача

function timeToMin(t) {
  if (!t) return 0;
  const [h, m] = t.split(':').map(Number);
  return (h || 0) * 60 + (m || 0);
}

function CalendarView({ clinicId, doctors, patients, rooms, specs, appointments, schedules, today, selectedDate: selectedDateProp, onDateChange, onNewAppt, onApptClick }) {
  const [selectedDateState, setSelectedDateState] = React.useState(selectedDateProp || today);
  const selectedDate = selectedDateProp ? selectedDateProp : (selectedDateState || today);
  const setSelectedDate = (val) => {
    const next = typeof val === 'function' ? val(selectedDate) : val;
    if (onDateChange) onDateChange(next); else setSelectedDateState(next);
  };
  const [expandedAppt, setExpandedAppt] = React.useState(null);
  const scrollRef = React.useRef(null);

  const dayAppts    = appointments.filter(function(a) { return a.scheduledAt && a.scheduledAt.startsWith(selectedDate); });
  const patientMap  = Object.fromEntries(patients.map(function(p) { return [p.id, p]; }));
  const roomMap     = Object.fromEntries(rooms.map(function(r) { return [r.id, r]; }));
  const specMap     = Object.fromEntries(specs.map(function(s) { return [s.id, s]; }));

  const clinicRoomIds    = new Set(rooms.map(function(r) { return r.id; }));
  const clinicSchedules  = schedules.filter(function(s) { return clinicRoomIds.has(s.roomId); });
  const dow              = dowApp(selectedDate);
  const daySchedules     = clinicSchedules.filter(function(s) { return s.dayOfWeek === dow; });
  const docSchedMap      = Object.fromEntries(daySchedules.map(function(s) { return [s.doctorId, s]; }));
  const activeDoctorIds  = Array.from(new Set(daySchedules.map(function(s) { return s.doctorId; })));
  const displayDoctors   = doctors.filter(function(d) { return activeDoctorIds.indexOf(d.id) !== -1; });

  function handleWorkClick(doc, sched, e) {
    e.stopPropagation();
    var rect       = e.currentTarget.getBoundingClientRect();
    var yOffset    = e.clientY - rect.top;
    var fromMin    = timeToMin(sched.timeFrom);
    var toMin      = timeToMin(sched.timeTo);
    var slotDur    = sched.slotDurationMin || 30;
    var clickedMin = fromMin + Math.floor(yOffset / PXM);
    var roundedMin = Math.floor(clickedMin / slotDur) * slotDur;
    var clampedMin = Math.min(Math.max(roundedMin, fromMin), toMin - slotDur);
    var hh = String(Math.floor(clampedMin / 60)).padStart(2, '0');
    var mm = String(clampedMin % 60).padStart(2, '0');
    onNewAppt(null, { specId: doc.specialization_id, date: selectedDate, doctorId: doc.id, preSlotTime: hh + ':' + mm });
  }

  React.useLayoutEffect(function() {
    if (!scrollRef.current || displayDoctors.length === 0) return;
    var firstMin = null;
    for (var i = 0; i < displayDoctors.length; i++) {
      var s = docSchedMap[displayDoctors[i].id];
      if (!s) continue;
      var m = timeToMin(s.timeFrom);
      if (firstMin == null || m < firstMin) firstMin = m;
    }
    if (firstMin != null) scrollRef.current.scrollTop = Math.max(0, firstMin * PXM - 40);
  }, [selectedDate, displayDoctors.length]);

  var navBtn = { padding: '4px 10px', fontSize: 13, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', minWidth: 30 };

  // 30-min slots: 48 per day
  var halfSlots = [];
  for (var si = 0; si < 48; si++) {
    halfSlots.push(si * 30);
  }

  return (
    <div className="cal-page">
      <div className="cal-nav">
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <button className="btn ghost" style={navBtn} onClick={() => setSelectedDate(function(d) { return addDays(d, -1); })}>←</button>
          <button className="btn ghost" style={Object.assign({}, navBtn, { fontSize: 11 })} onClick={() => setSelectedDate(today)}>Сегодня</button>
          <button className="btn ghost" style={navBtn} onClick={() => setSelectedDate(function(d) { return addDays(d, 1); })}>→</button>
        </div>
        <div>
          <span style={{ fontWeight: 600, fontSize: 15 }}>Расписание</span>
          <span style={{ marginLeft: 10, color: 'var(--ink-3)', fontSize: 13 }}>{fmtDateLong(selectedDate)}</span>
        </div>
        <div style={{ marginLeft: 'auto', display: 'flex', gap: 8, alignItems: 'center' }}>
          <input type="date" className="input-el" style={{ padding: '5px 8px', fontSize: 12, width: 140 }}
            value={selectedDate} onChange={function(e) { if (e.target.value) setSelectedDate(e.target.value); }} />
          <div className="cal-legend" style={{ display: 'flex', gap: 14, alignItems: 'center', fontSize: 12, color: 'var(--ink-3)' }}>
            <span><span className="tag ok dot" style={{ marginRight: 3 }}></span>Запланирована</span>
            <span><span className="tag info dot" style={{ marginRight: 3 }}></span>Завершена</span>
            <span><span className="tag err dot" style={{ marginRight: 3 }}></span>Отменена</span>
          </div>
          <button className="btn primary" onClick={onNewAppt}>+ Запись</button>
        </div>
      </div>

      <div className="cal-scroll" ref={scrollRef}>
        {displayDoctors.length === 0
          ? <Empty text={"Нет врачей с расписанием на " + fmtDateLong(selectedDate)} />
          : (
            <div className="cal-rows">
              <div className="cal-row-head">
                <div style={{ width: TIME_W, flexShrink: 0, background: 'var(--bg-soft)', borderRight: '1px solid var(--line)' }}></div>
                {displayDoctors.map(function(doc) {
                  var sched    = docSchedMap[doc.id];
                  var room     = sched ? roomMap[sched.roomId] : null;
                  var specName = specMap[doc.specialization_id] ? specMap[doc.specialization_id].name : '—';
                  return (
                    <div key={doc.id} className="doc-head" style={{ width: COL_W }}>
                      <Av p={doc} size={24} fs={9} />
                      <div style={{ minWidth: 0, flex: 1 }}>
                        <div style={{ fontSize: 12.5, fontWeight: 500, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{shortName(doc)}</div>
                        <div className="specialty">{specName}</div>
                        <div className="mono" style={{ fontSize: 10.5, color: 'var(--ink-3)' }}>
                          {sched ? sched.timeFrom + '–' + sched.timeTo : '—'}
                        </div>
                      </div>
                      {room && <div className="doc-room">{"№ " + room.number}</div>}
                    </div>
                  );
                })}
              </div>

              <div className="cal-row-body">
                <div className="time-col" style={{ width: TIME_W, height: DAY_H }}>
                  {halfSlots.map(function(totalMin) {
                    var hh = String(Math.floor(totalMin / 60)).padStart(2, '0');
                    var isHalf = (totalMin % 60) === 30;
                    return (
                      <div key={totalMin}
                        className={isHalf ? 'time-label time-label-half' : 'time-label'}
                        style={{ top: totalMin * PXM }}>
                        {isHalf ? hh + ':30' : hh + ':00'}
                      </div>
                    );
                  })}
                </div>

                {displayDoctors.map(function(doc) {
                  var sched   = docSchedMap[doc.id];
                  var fromMin = sched ? timeToMin(sched.timeFrom) : 0;
                  var toMin   = sched ? timeToMin(sched.timeTo)   : 0;
                  var myAppts = dayAppts.filter(function(a) { return a.doctorId === doc.id; });
                  var sorted  = myAppts.slice().sort(function(a, b) { return (a.status === 2 ? 0 : 1) - (b.status === 2 ? 0 : 1); });

                  return (
                    <div key={doc.id} className="doc-col" style={{ width: COL_W, height: DAY_H }}>
                      {sched && (
                        <div className="work-window"
                          style={{ top: fromMin * PXM, height: (toMin - fromMin) * PXM, zIndex: 1 }}
                          onClick={function(e) { handleWorkClick(doc, sched, e); }}
                          title="Нажмите — создать запись на это время"
                        />
                      )}
                      {halfSlots.map(function(totalMin) {
                        if (totalMin === 0) return null;
                        var isHalf = (totalMin % 60) === 30;
                        return (
                          <div key={totalMin}
                            className={isHalf ? 'half-line' : 'hour-line'}
                            style={{ top: totalMin * PXM, zIndex: 2 }}
                          />
                        );
                      })}
                      {sorted.map(function(a) {
                        var startMin  = timeToMin(a.scheduledAt.slice(11, 16));
                        var dur       = a.durationMin || (sched && sched.slotDurationMin) || 30;
                        var endMin    = startMin + dur;
                        var endStr    = String(Math.floor(endMin / 60)).padStart(2, '0') + ':' + String(endMin % 60).padStart(2, '0');
                        var pat       = patientMap[a.patientId];
                        var tag       = STATUS_TAG[a.status];
                        var cls       = 'appt' + (tag !== 'ok' ? ' ' + tag : '') + (a.status === 2 ? ' cancelled' : '');
                        var naturalH  = Math.max(22, dur * PXM - 2);
                        var isExp     = expandedAppt === a.id;
                        return (
                          <div key={a.id}
                            className={cls}
                            style={{
                              top:        startMin * PXM + 1,
                              minHeight:  naturalH,
                              maxHeight:  isExp ? 300 : naturalH,
                              height:     'auto',
                              overflow:   'hidden',
                              transition: 'max-height 0.22s ease, box-shadow 0.15s',
                              zIndex:     isExp ? 10 : (a.status === 2 ? 1 : 3),
                              boxShadow:  isExp ? '0 4px 16px rgba(0,0,0,0.18)' : 'none',
                            }}
                            onMouseEnter={function() { setExpandedAppt(a.id); }}
                            onMouseLeave={function() { setExpandedAppt(null); }}
                            onClick={function(e) { e.stopPropagation(); onApptClick(a); }}
                          >
                            <div className="pname">{shortName(pat)}</div>
                            <div className="ptime">{a.scheduledAt ? a.scheduledAt.slice(11,16) : ''}&ndash;{endStr}</div>
                            <div className="ptime" style={{ marginTop: 2, opacity: 0.85 }}>{STATUS_LABEL[a.status]}</div>
                            <div className="ptime" style={{ marginTop: 3, opacity: 0.7, whiteSpace: 'normal', lineHeight: 1.3 }}>{fullName(pat)}</div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            </div>
          )
        }
      </div>
    </div>
  );
}

// ── NEW APPOINTMENT WIZARD ────────────────────────────────────────────────────
function NewAppointmentView({ clinicId, patients, doctors, specs, schedules, appointments, onCreated, toast, prefillPatient, prefillAppt }) {
  const pa = prefillAppt || {};
  const hasSpec = pa.specId != null && pa.specId !== '';
  const hasDate = !!pa.date;
  const hasDoc = pa.doctorId != null && pa.doctorId !== '';
  const hasSlot = !!pa.slotTime;
  const initialStep =
    hasSpec && hasDate && hasDoc && hasSlot ? 5 :
    hasSpec && hasDate && hasDoc ? 4 :
    hasSpec && hasDate ? 3 :
    hasSpec ? 2 : 1;
  const [step, setStep] = React.useState(initialStep);
  const [specId, setSpecId] = React.useState(hasSpec ? String(pa.specId) : '');
  const [date, setDate] = React.useState(pa.date || '');
  const [doctorId, setDoctorId] = React.useState(hasDoc ? String(pa.doctorId) : '');
  const [slots, setSlots] = React.useState([]);
  // preSlotTime предвыбирает слот на шаге 4, slotTime используется для перехода на шаг 5
  const [slotTime, setSlotTime] = React.useState(pa.slotTime || pa.preSlotTime || '');
  const [patientId, setPatientId] = React.useState(prefillPatient?.id ?? '');
  const [loading, setLoading] = React.useState(false);
  const [availDates, setAvailDates] = React.useState([]);
  const [availDoctors, setAvailDoctors] = React.useState([]);

  const specDoctors = doctors.filter(d => !specId || d.specialization_id === parseInt(specId));
  const specMap = Object.fromEntries(specs.map(s => [s.id, s]));
  const patientMap = Object.fromEntries(patients.map(p => [p.id, p]));

  async function loadDates() {
    if (!specId) return;
    setLoading(true);
    try {
      const d = await apiGet(`/schedules/available-days?specId=${specId}&clinicId=${clinicId}&daysAhead=14`);
      setAvailDates(Array.isArray(d) ? d : []);
    } catch(e) {
      setAvailDates([]);
    }
    setLoading(false);
  }

  async function loadDoctors() {
    if (!specId || !date) return;
    setLoading(true);
    try {
      const ids = await apiGet(`/schedules/doctors-by-day?specId=${specId}&date=${date}&clinicId=${clinicId}`);
      setAvailDoctors(Array.isArray(ids) ? ids : []);
    } catch(e) {
      setAvailDoctors(specDoctors.map(d=>d.id));
    }
    setLoading(false);
  }

  async function loadSlots() {
    if (!doctorId || !date) return;
    setLoading(true);
    try {
      const s = await apiGet(`/schedules/time-slots?doctorId=${doctorId}&date=${date}&clinicId=${clinicId}`);
      setSlots(Array.isArray(s) ? s : []);
    } catch(e) {
      setSlots([]);
    }
    setLoading(false);
  }

  React.useEffect(() => { if (step === 2) loadDates(); }, [step]);
  React.useEffect(() => { if (step === 3) loadDoctors(); }, [step]);
  React.useEffect(() => { if (step === 4) loadSlots(); }, [step]);

  async function confirm() {
    if (!patientId || !doctorId || !date || !slotTime) { toast('Заполните все поля', false); return; }
    setLoading(true);
    try {
      await apiPost('/appointments', { patientId: parseInt(patientId), doctorId: parseInt(doctorId), scheduledAt: `${date} ${slotTime}` });
      toast('Запись создана', true);
      onCreated();
    } catch(e) {
      toast(e.message, false);
    }
    setLoading(false);
  }

  const stepLabels = ['Специализация','Дата','Врач','Слот','Подтверждение'];

  return (
    <div className="main">
      <div className="page-head">
        <div><h1>Новая запись</h1><div className="page-sub">Пошаговое создание приёма</div></div>
      </div>

      <div className="steps">
        {stepLabels.map((l, i) => {
          const n = i + 1;
          const cls = n < step ? 'done' : n === step ? 'cur' : '';
          return (
            <React.Fragment key={l}>
              {i > 0 && <div className={`line${n <= step ? ' on' : ''}`}></div>}
              <div className={`step ${cls}`}>
                <div className="n">{n < step ? '✓' : n}</div>
                {l}
              </div>
            </React.Fragment>
          );
        })}
      </div>

      <div className="card" style={{ maxWidth: 560 }}>
        <div className="card-body">
          {step === 1 && (
            <div>
              <Field label="Специализация">
                <Select value={specId} onChange={e => setSpecId(e.target.value)}>
                  <option value="">— Выберите специализацию —</option>
                  {specs.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                </Select>
              </Field>
              <button className="btn primary" disabled={!specId} onClick={() => setStep(2)}>Далее →</button>
            </div>
          )}
          {step === 2 && (
            <div>
              <Field label="Дата приёма" hint="Доступные даты загружены с сервера">
                {loading ? <Spinner /> : (
                  availDates.length > 0
                    ? <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
                        {availDates.map(d => (
                          <div key={d} className={`chip${date===d?' on':''}`} onClick={() => setDate(d)}>{fmtDate(d)}</div>
                        ))}
                      </div>
                    : <div>
                        <Input type="date" value={date} onChange={e => setDate(e.target.value)} />
                        <div className="hint" style={{ marginTop:4 }}>Нет доступных дат с сервера — введите вручную</div>
                      </div>
                )}
              </Field>
              <div style={{ display:'flex', gap:8 }}>
                <button className="btn ghost" onClick={() => setStep(1)}>← Назад</button>
                <button className="btn primary" disabled={!date} onClick={() => setStep(3)}>Далее →</button>
              </div>
            </div>
          )}
          {step === 3 && (
            <div>
              <Field label="Врач">
                {loading ? <Spinner /> : (
                  <Select value={doctorId} onChange={e => setDoctorId(e.target.value)}>
                    <option value="">— Выберите врача —</option>
                    {doctors.filter(d => !specId || d.specialization_id === parseInt(specId))
                      .filter(d => availDoctors.length === 0 || availDoctors.includes(d.id))
                      .map(d => <option key={d.id} value={d.id}>{fullName(d)}</option>)
                    }
                  </Select>
                )}
              </Field>
              <div style={{ display:'flex', gap:8 }}>
                <button className="btn ghost" onClick={() => setStep(2)}>← Назад</button>
                <button className="btn primary" disabled={!doctorId} onClick={() => setStep(4)}>Далее →</button>
              </div>
            </div>
          )}
          {step === 4 && (
            <div>
              <Field label="Время приёма">
                {loading ? <Spinner /> : (
                  slots.length > 0
                    ? <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
                        {slots.map(s => (
                          <div key={s.time} className={`chip${slotTime===s.time?' on':''}`} onClick={() => setSlotTime(s.time)}>
                            {s.time}

                    : <div>
                        <Input type="time" value={slotTime} onChange={e => setSlotTime(e.target.value)} />
                        <div className="hint" style={{ marginTop:4 }}>Свободных слотов не найдено — введите время вручную</div>
                      </div>
                )}
              </Field>
              <div style={{ display:'flex', gap:8 }}>
                <button className="btn ghost" onClick={() => setStep(3)}>← Назад</button>
                <button className="btn primary" disabled={!slotTime} onClick={() => setStep(5)}>Далее →</button>
              </div>
            </div>
          )}
          {step === 5 && (
            <div>
              <Field label="Пациент">
                <Select value={patientId} onChange={e => setPatientId(e.target.value)}>
                  <option value="">— Выберите пациента —</option>
                  {patients.map(p => <option key={p.id} value={p.id}>{fullName(p)}</option>)}
                </Select>
              </Field>
              <div style={{ padding:'12px 14px', background:'var(--bg-soft)', borderRadius:8, marginBottom:14, fontSize:13 }}>
                <div style={{ color:'var(--ink-3)', fontSize:11, marginBottom:6, textTransform:'uppercase', letterSpacing:'0.06em' }}>Сводка записи</div>

                <button className="btn primary" disabled={loading || !patientId} onClick={confirm}>

            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── NEW APPOINTMENT — общая логика (без изменений в обращениях к серверу) ──────
function useNewAppt({ clinicId, doctors, prefillPatient, prefillAppt, onCreated, toast }) {
  const pa = prefillAppt || {};
  const [specId, setSpecId]       = React.useState(pa.specId != null && pa.specId !== '' ? String(pa.specId) : '');
  const [date, setDate]           = React.useState(pa.date || '');
  const [doctorId, setDoctorId]   = React.useState(pa.doctorId != null && pa.doctorId !== '' ? String(pa.doctorId) : '');
  const [slotTime, setSlotTime]   = React.useState(pa.slotTime || pa.preSlotTime || '');
  const [patientId, setPatientId] = React.useState(prefillPatient?.id != null ? String(prefillPatient.id) : '');
  const [availDates, setAvailDates]     = React.useState([]);
  const [availDoctors, setAvailDoctors] = React.useState([]);
  const [slots, setSlots]               = React.useState([]);
  const [loadingDates, setLoadingDates]     = React.useState(false);
  const [loadingDoctors, setLoadingDoctors] = React.useState(false);
  const [loadingSlots, setLoadingSlots]     = React.useState(false);
  const [saving, setSaving]                 = React.useState(false);
  // токены актуальности — отбрасываем ответы устаревших запросов (гонки при быстрых кликах)
  const datesSeq   = React.useRef(0);
  const doctorsSeq = React.useRef(0);
  const slotsSeq   = React.useRef(0);

  const specDoctors = doctors.filter(d => !specId || d.specialization_id === parseInt(specId));

  const loadDates = React.useCallback(async () => {
    if (!specId) { setAvailDates([]); return; }
    const seq = ++datesSeq.current;
    setLoadingDates(true);
    try { const d = await apiGet(`/schedules/available-days?specId=${specId}&clinicId=${clinicId}&daysAhead=14`); if (seq === datesSeq.current) setAvailDates(Array.isArray(d) ? d : []); }
    catch (e) { if (seq === datesSeq.current) setAvailDates([]); }
    if (seq === datesSeq.current) setLoadingDates(false);
  }, [specId, clinicId]);

  const loadDoctors = React.useCallback(async () => {
    if (!specId || !date) { setAvailDoctors([]); return; }
    const seq = ++doctorsSeq.current;
    setLoadingDoctors(true);
    try { const ids = await apiGet(`/schedules/doctors-by-day?specId=${specId}&date=${date}&clinicId=${clinicId}`); if (seq === doctorsSeq.current) setAvailDoctors(Array.isArray(ids) ? ids : []); }
    catch (e) { if (seq === doctorsSeq.current) setAvailDoctors(specDoctors.map(d => d.id)); }
    if (seq === doctorsSeq.current) setLoadingDoctors(false);
  }, [specId, date, clinicId]);

  const loadSlots = React.useCallback(async () => {
    if (!doctorId || !date) { setSlots([]); return; }
    const seq = ++slotsSeq.current;
    setLoadingSlots(true);
    try { const s = await apiGet(`/schedules/time-slots?doctorId=${doctorId}&date=${date}&clinicId=${clinicId}`); if (seq === slotsSeq.current) setSlots(Array.isArray(s) ? s : []); }
    catch (e) { if (seq === slotsSeq.current) setSlots([]); }
    if (seq === slotsSeq.current) setLoadingSlots(false);
  }, [doctorId, date, clinicId]);

  async function confirm() {
    if (!patientId || !doctorId || !date || !slotTime) { toast('Заполните все поля', false); return false; }
    setSaving(true);
    try {
      await apiPost('/appointments', { patientId: parseInt(patientId), doctorId: parseInt(doctorId), scheduledAt: `${date} ${slotTime}` });
      toast('Запись создана', true);
      setSaving(false);
      onCreated();
      return true;
    } catch (e) { toast(e.message, false); setSaving(false); return false; }
  }

  return {
    specId, setSpecId, date, setDate, doctorId, setDoctorId, slotTime, setSlotTime, patientId, setPatientId,
    availDates, availDoctors, slots, loadingDates, loadingDoctors, loadingSlots, saving,
    loadDates, loadDoctors, loadSlots, confirm, specDoctors,
  };
}

        </div>

        <div>
          <Field label="Дата приёма" hint="Доступные даты загружены с сервера">

        </div>

      {step === 3 && (

// ── ВАРИАНТ 2: быстрая форма во всплывающем окне (всё на одном экране) ─────────
function NewAppointmentQuickModal({ clinicId, patients, doctors, specs, prefillPatient, prefillAppt, onCreated, onClose, toast }) {
  const F = useNewAppt({ clinicId, doctors, prefillPatient, prefillAppt, onCreated, toast });

  // каскадная загрузка: спец → даты, дата → врачи, врач → слоты
  React.useEffect(() => { F.loadDates(); }, [F.specId]);
  React.useEffect(() => { F.loadDoctors(); }, [F.specId, F.date]);
  React.useEffect(() => { F.loadSlots(); }, [F.doctorId, F.date]);

  function pickSpec(v)   { F.setSpecId(v);   F.setDate('');     F.setDoctorId(''); F.setSlotTime(''); }
  function pickDate(v)   { F.setDate(v);     F.setDoctorId(''); F.setSlotTime(''); }
  function pickDoctor(v) { F.setDoctorId(v); F.setSlotTime(''); }

  const availableDoctors = F.specDoctors.filter(d => F.availDoctors.length === 0 || F.availDoctors.includes(d.id));
  const ready = F.specId && F.date && F.doctorId && F.slotTime && F.patientId;

  return (
    <Modal title="Новая запись" onClose={onClose} width={460}>

        <Field label="Пациент">
          <Select value={F.patientId} onChange={e => F.setPatientId(e.target.value)}>
            <option value="">— Выберите пациента —</option>
            {patients.map(p => <option key={p.id} value={p.id}>{fullName(p)}</option>)}
          </Select>
        </Field>

        <Field label="Дата приёма">
          {!F.specId ? <div className="quick-hint">Сначала выберите специализацию</div>

            : F.availDates.length > 0
              ? <div className="chips">{F.availDates.map(d => <div key={d} className={`chip${F.date === d ? ' on' : ''}`} onClick={() => pickDate(d)}>{fmtDate(d)}</div>)}</div>
              : <Input type="date" value={F.date} onChange={e => pickDate(e.target.value)} />}
        </Field>

        <Field label="Врач">
          {!F.date ? <div className="quick-hint">Сначала выберите дату</div>

                {availableDoctors.map(d => <option key={d.id} value={d.id}>{fullName(d)}</option>)}

        </Field>

        <Field label="Время приёма">
          {!F.doctorId ? <div className="quick-hint">Сначала выберите врача</div>
            : F.loadingSlots ? <Spinner />
            : F.slots.length > 0
              ? <div className="chips">{F.slots.map(s => <div key={s.time} className={`chip${F.slotTime === s.time ? ' on' : ''}`} onClick={() => F.setSlotTime(s.time)}>{s.time}</div>)}</div>

      <div className="appt-actions" style={{ justifyContent: 'flex-end', marginTop: 6 }}>
        <button className="btn ghost" onClick={onClose}>Отмена</button>
        <button className="btn primary" disabled={F.saving || !ready} onClick={onConfirm}>{F.saving ? 'Создаём…' : 'Создать запись'}</button>
      </div>
    </Modal>
  );
}
