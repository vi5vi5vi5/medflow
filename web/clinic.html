      <div className="row2">
        <Field label="Полис ОМС *" hint="16 цифр"><Input placeholder="1234567890123456" value={f.insuranceNum} onChange={set('insuranceNum')} /></Field>
        <Field label="Дата рождения"><Input type="date" value={f.birthDate} onChange={set('birthDate')} /></Field>
      </div>
      <Field label="Телефон"><Input placeholder="+375 (29) 000-00-00" value={f.phone} onChange={set('phone')} /></Field>
      <div style={{ display:'flex', gap:8, justifyContent:'flex-end', marginTop:4 }}>
        <button className="btn ghost" onClick={onClose}>Отмена</button>
        <button className="btn primary" onClick={save}>Сохранить</button>
      </div>
    </Modal>
  );
}

function AddDoctorModal({ specs, onSave, onClose, toast }) {
  const [f, setF] = React.useState({ last_name:'', first_name:'', middle_name:'', phone:'', specialization_id:'' });
  const set = k => e => setF(p => ({ ...p, [k]: e.target.value }));
  async function save() {
    try {
      await apiPost('/doctors', { ...f, specialization_id: parseInt(f.specialization_id) });
      toast('Врач добавлен', true);
      onSave();
    } catch(e) { toast(e.message, false); }
  }
  return (
    <Modal title="Добавить врача" onClose={onClose} width={500}>
      <div className="row2">
        <Field label="Фамилия"><Input placeholder="Петрова" value={f.last_name} onChange={set('last_name')} /></Field>
        <Field label="Имя"><Input placeholder="Ольга" value={f.first_name} onChange={set('first_name')} /></Field>
      </div>
      <div className="row2">
        <Field label="Отчество"><Input value={f.middle_name} onChange={set('middle_name')} /></Field>
        <Field label="Телефон"><Input placeholder="+375 (29) 100-00-00" value={f.phone} onChange={set('phone')} /></Field>
      </div>
      <Field label="Специализация">
        <Select value={f.specialization_id} onChange={set('specialization_id')}>
          <option value="">— выберите —</option>
          {specs.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
        </Select>
      </Field>
      <div style={{ display:'flex', gap:8, justifyContent:'flex-end' }}>
        <button className="btn ghost" onClick={onClose}>Отмена</button>
        <button className="btn primary" onClick={save}>Сохранить</button>
      </div>
    </Modal>
  );
}

function AddScheduleModal({ doctor, rooms, onSave, onClose, toast }) {
  const [f, setF] = React.useState({ dayOfWeek:'1', roomId:'', timeFrom:'09:00', timeTo:'17:00', slotDurationMin:'30', breakAfterMin:'5' });
  const set = k => e => setF(p => ({ ...p, [k]: e.target.value }));
  async function save() {
    try {
      await apiPost('/schedules', { doctorId: doctor.id, roomId: parseInt(f.roomId), dayOfWeek: parseInt(f.dayOfWeek), timeFrom: f.timeFrom, timeTo: f.timeTo, slotDurationMin: parseInt(f.slotDurationMin), breakAfterMin: parseInt(f.breakAfterMin) });
      toast('Расписание добавлено', true);
      onSave();
    } catch(e) { toast(e.message, false); }
  }
  return (
    <Modal title={`Расписание — ${shortName(doctor)}`} onClose={onClose} width={460}>
      <div className="row2">
        <Field label="День недели">
          <Select value={f.dayOfWeek} onChange={set('dayOfWeek')}>
            {DAYS.slice(1).map((d,i) => <option key={i+1} value={i+1}>{d}</option>)}
          </Select>
        </Field>
        <Field label="Кабинет">
          <Select value={f.roomId} onChange={set('roomId')}>
            <option value="">— выберите —</option>
            {rooms.map(r => <option key={r.id} value={r.id}>№ {r.number} ({r.floor} эт.)</option>)}
          </Select>
        </Field>
      </div>
      <div className="row2">
        <Field label="Начало"><Input type="time" value={f.timeFrom} onChange={set('timeFrom')} /></Field>
        <Field label="Конец"><Input type="time" value={f.timeTo} onChange={set('timeTo')} /></Field>
      </div>
      <div className="row2">
        <Field label="Длит. слота (мин)"><Input type="number" value={f.slotDurationMin} onChange={set('slotDurationMin')} /></Field>
        <Field label="Перерыв (мин)"><Input type="number" value={f.breakAfterMin} onChange={set('breakAfterMin')} /></Field>
      </div>
      <div style={{ display:'flex', gap:8, justifyContent:'flex-end' }}>
        <button className="btn ghost" onClick={onClose}>Отмена</button>
        <button className="btn primary" onClick={save}>Сохранить</button>
      </div>
    </Modal>
  );
}

function AddRoomModal({ clinicId, onSave, onClose, toast }) {
  const [f, setF] = React.useState({ number:'', floor:'1' });
  const set = k => e => setF(p => ({ ...p, [k]: e.target.value }));
  async function save() {
    try {
      await apiPost('/rooms', { number: f.number, floor: parseInt(f.floor), clinicId });
      toast('Кабинет добавлен', true);
      onSave();
    } catch(e) { toast(e.message, false); }
  }
  return (
    <Modal title="Добавить кабинет" onClose={onClose} width={380}>
      <div className="row2">
        <Field label="Номер кабинета"><Input placeholder="214А" value={f.number} onChange={set('number')} /></Field>
        <Field label="Этаж"><Input type="number" min="1" value={f.floor} onChange={set('floor')} /></Field>
      </div>
      <div style={{ display:'flex', gap:8, justifyContent:'flex-end' }}>
        <button className="btn ghost" onClick={onClose}>Отмена</button>
        <button className="btn primary" onClick={save}>Сохранить</button>
      </div>
    </Modal>
  );
}

function ApptDetailModal({ appt, patients, doctors, onClose, onChangeStatus, toast }) {
  const pat = patients.find(p => p.id === appt.patientId);
  const doc = doctors.find(d => d.id === appt.doctorId);
  const [notes, setNotes] = React.useState(appt.notes || '');
  async function saveNotes() {
    try {
      await apiPatch(`/appointments/${appt.id}/notes`, { notes });
      toast('Заметки сохранены', true);
    } catch(e) { toast(e.message, false); }
  }
  return (
    <Modal title="Запись на приём" onClose={onClose} width={420}>
      <div style={{ display:'flex', gap:10, marginBottom:14 }}>
        <Av p={pat} size={40} fs={14} />
        <div>
          <div style={{ fontWeight:600 }}>{fullName(pat)}</div>
          <div style={{ fontSize:12, color:'var(--ink-3)' }}>{appt.scheduledAt}</div>
          <div style={{ fontSize:12, color:'var(--ink-3)' }}>Врач: {shortName(doc)}</div>
        </div>
      </div>
      <div style={{ display:'flex', gap:6, marginBottom:14 }}>
        {[['Подтверждена',0],['Завершена',1],['Отменена',2]].map(([l,v]) => (
          <button key={v} className={`btn${appt.status===v?' primary':' ghost'}`} style={{ flex:1, justifyContent:'center', fontSize:12 }}
            onClick={() => onChangeStatus(appt.id, v)}>{l}</button>
        ))}
      </div>
      <Field label="Заметки">
        <textarea className="input-el" rows={3} value={notes} onChange={e => setNotes(e.target.value)} style={{ resize:'vertical' }} />
      </Field>
      <div style={{ display:'flex', gap:8, justifyContent:'flex-end' }}>
        <button className="btn ghost" onClick={onClose}>Закрыть</button>
        <button className="btn primary" onClick={saveNotes}>Сохранить заметки</button>
      </div>
    </Modal>
  );
}

Object.assign(window, {
  DashboardView, CalendarView, PatientsView, DoctorsView, RoomsView,
  NewAppointmentWizardModal, NewAppointmentQuickModal, AddPatientModal, AddDoctorModal, AddScheduleModal,
  AddRoomModal, ApptDetailModal, Modal, ConfirmModal,
});

</script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const API = '/api';
const apiFetch = async (path, opts = {}) => {
  const res = await fetch(API + path, opts);
  const json = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
  return json;
};
const apiGet = p => apiFetch(p);
const apiPost = (p, b) => apiFetch(p, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(b) });
const apiPatch = (p, b) => apiFetch(p, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify(b) });
const apiDel = p => apiFetch(p, { method:'DELETE' });

// NAV items
const NAV = [
  { id:'dashboard', label:'Дашборд',          icon:<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg> },
  { id:'calendar',  label:'Расписание сегодня', icon:<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg> },
  { id:'patients',  label:'Пациенты',           icon:<svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> },
  { id:'doctors',   label:'Врачи',              icon:<svg viewBox="0 0 24 24"><path d="M12 2v2M10 3h4M8 7a4 4 0 0 0 8 0V5H8z"/><path d="M5 21v-2a7 7 0 0 1 14 0v2"/><path d="M12 14v4M10 16h4"/></svg> },
  { id:'rooms',     label:'Кабинеты',           icon:<svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> },
  { id:'newappt',   label:'Новая запись',        icon:<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>, primary: true },
];

const VIEW_LABELS = { dashboard:'Дашборд', calendar:'Расписание', patients:'Пациенты', doctors:'Врачи', rooms:'Кабинеты' };
const ALLOWED_VIEWS = ['dashboard','calendar','patients','doctors','rooms'];

function App() {
  const [view, setView] = useState(() => {
    const v = localStorage.getItem('mf_view');
    return ALLOWED_VIEWS.includes(v) ? v : 'dashboard';
  });
  useEffect(() => { localStorage.setItem('mf_view', view); }, [view]);

  const [theme, setTheme] = useState('light');
  const [connected, setConnected] = useState(true);
  const [sidebarOpen, setSidebarOpen] = useState(false);

  // auth — clinicId приходит из URL /clinic/:id, иначе из localStorage
  const pathMatch = window.location.pathname.match(/^\/clinic\/(\d+)/);
  const auth = (() => { try { return JSON.parse(localStorage.getItem('medflow_auth') || '{}'); } catch{ return {}; } })();
  const clinicId = pathMatch ? parseInt(pathMatch[1], 10) : (auth.id ?? 0);

  // data
  const [clinic, setClinic] = useState(null);
  const [patients, setPatients] = useState([]);
  const [doctors, setDoctors] = useState([]);
  const [rooms, setRooms] = useState([]);
  const [specs, setSpecs] = useState([]);
  const [schedules, setSchedules] = useState([]);
  const [appointments, setAppointments] = useState([]);
  const [today, setToday] = useState('');
  const [loading, setLoading] = useState(true);

  // дата календаря вынесена в App — переживает открытие модалки записи,
  // поэтому после создания записи вид расписания не сбрасывается на сегодня
  const [calDate, setCalDate] = useState('');
  useEffect(() => { setCalDate(prev => prev || today); }, [today]);

  // единый стек модальных окон
  const [modal, setModal] = useState(null);

  // toast
  const [toast, setToast] = useState(null);
  const toastTimer = useRef(null);
  function showToast(msg, ok = true) {
    clearTimeout(toastTimer.current);
    setToast({ msg, ok });
    toastTimer.current = setTimeout(() => setToast(null), 3200);
  }

  // theme
  useEffect(() => {
    const saved = localStorage.getItem('mf_theme') || 'light';
    setTheme(saved);
    document.documentElement.dataset.theme = saved;
  }, []);
  function toggleTheme() {
    const t = theme === 'light' ? 'dark' : 'light';
    setTheme(t);
    document.documentElement.dataset.theme = t;
    localStorage.setItem('mf_theme', t);
  }

  // load all data
  const loadAll = useCallback(async (silent = false) => {
    if (!silent) setLoading(true);
    try {
      const [cl, pt, dc, rm, sp, sc, ap, td] = await Promise.all([
        apiGet(`/clinics/${clinicId}`).catch(() => null),
        apiPost('/patients/search', { clinic_id: clinicId }).catch(() => []),
        apiGet('/doctors').catch(() => []),
        apiGet(`/rooms/by-clinic/${clinicId}`).catch(() => []),
        apiGet('/specializations').catch(() => []),
        apiGet('/schedules').catch(() => []),
        apiGet('/appointments').catch(() => []),
        apiGet('/schedules/today').catch(() => null),
      ]);
      if (td?.today) setToday(td.today);
      setClinic(cl);
      // сервер уже отфильтровал по clinic_id — не тянем и не фильтруем чужих пациентов на клиенте
      const clinicPatients   = Array.isArray(pt) ? pt : [];
      const clinicRooms      = Array.isArray(rm) ? rm : [];
      const allSchedules     = Array.isArray(sc) ? sc : [];
      const clinicRoomIds    = new Set(clinicRooms.map(r => r.id));
      const clinicPatientIds = new Set(clinicPatients.map(p => p.id));
      setPatients(clinicPatients);
      setDoctors(Array.isArray(dc) ? dc : []);
      setRooms(clinicRooms);
      setSpecs(Array.isArray(sp) ? sp : []);
      setSchedules(allSchedules);
      setAppointments(Array.isArray(ap) ? ap.filter(a => {
        if (clinicPatientIds.has(a.patientId)) return true;
        const dateStr = a.scheduledAt?.slice(0, 10);
        if (!dateStr) return false;
        const j = new Date(dateStr + 'T00:00:00').getDay();
        const dow = j === 0 ? 7 : j;
        const timeHH = a.scheduledAt.slice(11, 13);
        return allSchedules.some(s =>
          s.doctorId === a.doctorId && s.dayOfWeek === dow &&
          clinicRoomIds.has(s.roomId) &&
          s.timeFrom?.slice(0, 2) <= timeHH && timeHH < s.timeTo?.slice(0, 2)
        );
      }) : []);
      setConnected(true);
    } catch(e) {
      setConnected(false);
    }
    if (!silent) setLoading(false);
  }, [clinicId]);

  useEffect(() => { loadAll(); }, [loadAll]);

  // ── Авто-обновление (поллинг) ───────────────────────────────────────────────
  // Тихо перечитываем данные с сервера, чтобы новые записи — в т.ч. сделанные
  // пациентами с других устройств/IP — появлялись без перезагрузки страницы.
  // silent=true → без флага loading, поэтому нет мигания «Загрузка данных…».
  const POLL_MS = 5000;
  useEffect(() => {
    const tick = () => { if (document.visibilityState === 'visible') loadAll(true); };
    const id = setInterval(tick, POLL_MS);
    // при возврате на вкладку — обновить сразу, не дожидаясь интервала
    document.addEventListener('visibilitychange', tick);
    return () => { clearInterval(id); document.removeEventListener('visibilitychange', tick); };
  }, [loadAll]);

  // CRUD handlers
  async function deletePatient(id) { try { await apiDel(`/patients/${id}`); await loadAll(true); showToast('Пациент удалён'); } catch(e) { showToast(e.message, false); } }
  async function deleteDoctor(id)  { try { await apiDel(`/doctors/${id}`);  await loadAll(true); showToast('Врач удалён'); }    catch(e) { showToast(e.message, false); } }
  async function deleteRoom(id)    { try { await apiDel(`/rooms/${id}`);    await loadAll(true); showToast('Кабинет удалён'); } catch(e) { showToast(e.message, false); } }
  async function deleteSchedule(id){ try { await apiDel(`/schedules/${id}`);await loadAll(true); showToast('Расписание удалено'); }catch(e){ showToast(e.message, false); } }
  async function changeApptStatus(id, status) {
    try { await apiPatch(`/appointments/${id}/status`, { status }); await loadAll(true); showToast('Статус обновлён'); }
    catch(e) { showToast(e.message, false); }
  }

  const openNewAppt = (patient, prefill) => {
    setModal({ type: 'newAppt', patient: patient || null, prefill: prefill || null });
  };

  function navClick(id) {
    setSidebarOpen(false);
    if (id === 'newappt') openNewAppt();
    else setView(id);
  }

  const props = { clinicId, clinic, patients, doctors, rooms, specs, schedules, appointments, today };

  return (
    <div className="app">
      {/* Sidebar */}
      <aside className={`sidebar${sidebarOpen ? ' open' : ''}`}>
        <div className="brand">
          <div className="brand-mark">М</div>
          <span>MedFlow</span>
        </div>
        {clinic && (
          <div className="clinic-info">
            <div className="ci-label">Поликлиника</div>
            <div className="ci-name">{clinic.name}</div>
            <div className="ci-addr">{clinic.address}</div>
          </div>
        )}
        <div className="side-label">Меню</div>
        {NAV.map(n => (
          <div key={n.id} className={`nav-item${view===n.id?' active':''}${n.primary?' nav-primary':''}`} onClick={() => navClick(n.id)}>
            <span className="ico">{n.icon}</span>
            <span>{n.label}</span>
            {n.id==='patients' && <span className="cnt">{patients.length}</span>}
            {n.id==='doctors'  && <span className="cnt">{doctors.length}</span>}
            {n.id==='rooms'    && <span className="cnt">{rooms.length}</span>}
          </div>
        ))}
        <div style={{flex:1}}></div>
        <div className="sidebar-foot">
          <div className="avatar">{clinicId}</div>
          <div>
            <div className="who">{clinic?.name || 'Поликлиника'}</div>
            <div className="role-badge">Администратор · ID {clinicId}</div>
          </div>
        </div>
      </aside>
      {sidebarOpen && <div className="nav-backdrop" onClick={() => setSidebarOpen(false)}></div>}

      {/* Main content */}
      <div className="content">
        {/* Topbar */}
        <div className="topbar">
          <button className="icon-btn hamburger" onClick={() => setSidebarOpen(true)} aria-label="Меню">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
          </button>
          <div className="breadcrumb">
            <span>MedFlow</span>
            <span className="sep">/</span>
            <span className="here">{VIEW_LABELS[view]}</span>
          </div>
          <div className="topbar-right">
            <button className="theme-toggle" onClick={toggleTheme}>
              <span className="tgl"></span>
              <span>{theme==='dark'?'Тёмная':'Светлая'}</span>
            </button>
            <button className="btn primary" onClick={() => openNewAppt()}>+ Новая запись</button>
          </div>
        </div>

        {/* Connection warning */}
        {!connected && (
          <div className="conn-banner">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
            Нет соединения с сервером — данные могут быть неактуальны
            <button className="btn ghost" style={{padding:'2px 8px',fontSize:11}} onClick={loadAll}>Повторить</button>
          </div>
        )}

        {/* View area */}
        <div className="scroll-area">
          {loading ? (
            <div style={{display:'grid',placeItems:'center',height:'60vh',color:'var(--ink-3)',fontSize:14}}>Загрузка данных…</div>
          ) : (
            <>
              {view==='dashboard' && <DashboardView {...props} onNavigate={setView} onNewAppt={openNewAppt} toast={showToast} />}
              {view==='calendar'  && <CalendarView  {...props} selectedDate={calDate} onDateChange={setCalDate} onNewAppt={openNewAppt} onApptClick={a => setModal({type:'appt', appt:a})} />}
              {view==='patients'  && <PatientsView  {...props} onAddPatient={() => setModal({type:'addPatient'})} onDeletePatient={deletePatient} onNewAppt={openNewAppt} onChangeApptStatus={changeApptStatus} toast={showToast} />}
              {view==='doctors'   && <DoctorsView   {...props} onAddDoctor={() => setModal({type:'addDoctor'})} onDeleteDoctor={deleteDoctor} onAddSchedule={d => setModal({type:'addSchedule', doctor:d})} onDeleteSchedule={deleteSchedule} toast={showToast} />}
              {view==='rooms'     && <RoomsView     {...props} onAddRoom={() => setModal({type:'addRoom'})} onDeleteRoom={deleteRoom} />}
            </>
          )}
        </div>
      </div>

      {/* Modals */}
      {modal?.type==='addPatient' && <AddPatientModal clinicId={clinicId} onSave={() => { loadAll(true); setModal(null); }} onClose={() => setModal(null)} toast={showToast} />}
      {modal?.type==='addDoctor'  && <AddDoctorModal  specs={specs}  onSave={() => { loadAll(true); setModal(null); }} onClose={() => setModal(null)} toast={showToast} />}
      {modal?.type==='addRoom'    && <AddRoomModal    clinicId={clinicId} onSave={() => { loadAll(true); setModal(null); }} onClose={() => setModal(null)} toast={showToast} />}
      {modal?.type==='addSchedule'&& <AddScheduleModal doctor={modal.doctor} rooms={rooms} onSave={() => { loadAll(true); setModal(null); }} onClose={() => setModal(null)} toast={showToast} />}
      {modal?.type==='appt'       && <ApptDetailModal appt={modal.appt} patients={patients} doctors={doctors} onClose={() => setModal(null)} onChangeStatus={async (id,s) => { await changeApptStatus(id,s); setModal(null); }} toast={showToast} />}
      {modal?.type==='newAppt'    && <NewAppointmentQuickModal {...props} prefillPatient={modal.patient} prefillAppt={modal.prefill} onCreated={() => { loadAll(true); setModal(null); }} onClose={() => setModal(null)} toast={showToast} />}

      {/* Toast */}
      {toast && <div className={`toast ${toast.ok?'ok':'err'}`}>{toast.msg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
