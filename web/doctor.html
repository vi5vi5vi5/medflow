<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef, useLayoutEffect, useCallback } = React;

// =============================================================================
// API CLIENT  (real backend — business logic preserved verbatim)
// =============================================================================
const API = '/api';
const apiFetch = async (path, opts = {}) => {
  const res = await fetch(API + path, opts);
  const json = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
  return json;
};
const apiGet   = p     => apiFetch(p);
const apiPost  = (p,b) => apiFetch(p, { method:'POST',  headers:{'Content-Type':'application/json'}, body: JSON.stringify(b) });
const apiPatch = (p,b) => apiFetch(p, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify(b) });

const COLOR_KEYS = ['c1','c2','c3'];
const COLOR_VARS = ['--clinic-1','--clinic-2','--clinic-3'];
const TINT_VARS  = ['--clinic-1-tint','--clinic-2-tint','--clinic-3-tint'];

function convertPatient(p) {
  if (!p) return null;
  const last = (p.last_name && p.last_name !== 'LName_Unknown') ? p.last_name : '';
  const first= (p.first_name && p.first_name !== 'Name_Unknown') ? p.first_name : '';
  const mid  = (p.middle_name && p.middle_name !== 'MName_Unknown') ? p.middle_name : '';
  return {
    id: p.id, lastName: last, firstName: first, middle: mid,
    gender: p.gender === 0 ? 'жен.' : p.gender === 1 ? 'муж.' : '—',
    dob: p.birthDate ? p.birthDate.split('-').reverse().join('.') : '—',
    phone: (p.phone && p.phone !== 'Phone_Unknown') ? p.phone : '—',
    insurance: p.insuranceNum || '—',
  };
}

function convertDoctor(d, specialty) {
  if (!d) return null;
  const last = (d.last_name && d.last_name !== 'LName_Unknown') ? d.last_name : '';
  const first= (d.first_name && d.first_name !== 'Name_Unknown') ? d.first_name : '';
  const mid  = (d.middle_name && d.middle_name !== 'MName_Unknown') ? d.middle_name : '';
  const f = first ? first[0] + '.' : '';
  const m = mid   ? mid[0]   + '.' : '';
  return {
    id: d.id,
    name: [last, first, mid].filter(Boolean).join(' '),
    short: `${last} ${f}${m}`.trim(),
    initials: (last[0] || '') + (first[0] || ''),
    specialty: specialty || '',
    phone: (d.phone && d.phone !== 'Phone_Unknown') ? d.phone : '—',
  };
}

// =============================================================================
// HELPERS
// =============================================================================
const MONTH_GEN  = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const MONTH_SHORT= ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
const DOW_FULL   = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
const DOW_SHORT  = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
const DOW_MONDAY = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

function fullName(p) { if (!p) return '—'; return [p.lastName, p.firstName, p.middle].filter(Boolean).join(' ') || '—'; }
function shortName(p) {
  if (!p) return '—';
  const last = p.lastName || '';
  const f = p.firstName ? p.firstName[0] + '.' : '';
  const m = p.middle    ? p.middle[0]    + '.' : '';
  return `${last} ${f}${m}`.trim() || '—';
}
function initials(p) { if (!p) return '??'; return (p.lastName?.[0]||'') + (p.firstName?.[0]||''); }
function calcAge(dobStr, todayIso) {
  if (!dobStr || dobStr === '—') return '—';
  const [d,m,y] = dobStr.split('.').map(Number);
  if (!d || !m || !y) return '—';
  const t = new Date((todayIso || '2026-04-20') + 'T00:00:00');
  let age = t.getFullYear() - y;
  if (t.getMonth()+1 < m || (t.getMonth()+1 === m && t.getDate() < d)) age--;
  return age;
}
function timeToMin(t) { if (!t) return 0; const [h,m] = t.split(':').map(Number); return h*60 + m; }
function minToTime(min) { const h = Math.floor(min/60), m = min%60; return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0'); }
function dowApp(isoDate) { const j = new Date(isoDate + 'T00:00:00').getDay(); return j === 0 ? 7 : j; }
function addDays(isoDate, delta) {
  const [y,m,d] = isoDate.split('-').map(Number);
  const dt = new Date(Date.UTC(y, m-1, d));
  dt.setUTCDate(dt.getUTCDate() + delta);
  return dt.toISOString().slice(0,10);
}
function fmtDateLong(isoDate) {
  const d = new Date(isoDate + 'T00:00:00');
  return `${DOW_SHORT[d.getDay()]}, ${d.getDate()} ${MONTH_GEN[d.getMonth()]} ${d.getFullYear()}`;
}
function fmtDateShort(isoDate) {
  const d = new Date(isoDate + 'T00:00:00');
  return `${d.getDate()} ${MONTH_SHORT[d.getMonth()]}`;
}
function fmtIso(isoDate) { const [y,m,d] = isoDate.split('-'); return `${d}.${m}.${y}`; }
function getMondayIso(isoDate) { const dow = dowApp(isoDate); return addDays(isoDate, -(dow - 1)); }
function plural(n, one, few, many) {
  const m10 = n % 10, m100 = n % 100;
  if (m10 === 1 && m100 !== 11) return one;
  if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return few;
  return many;
}

const VIEW_LABELS = { calendar:'Календарь', appts:'Мои записи', schedule:'Моё расписание' };

const DK_NAV = [
  { id:'calendar', label:'Календарь',     ico:<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg> },
  { id:'appts',    label:'Мои записи',    ico:<svg viewBox="0 0 24 24"><path d="M9 11H4v9h16v-9h-5"/><path d="M9 11V5a3 3 0 0 1 6 0v6"/></svg> },
  { id:'schedule', label:'Моё расписание',ico:<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> },
];

const IcoCal   = <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>;
const IcoList  = <svg viewBox="0 0 24 24"><path d="M9 11H4v9h16v-9h-5"/><path d="M9 11V5a3 3 0 0 1 6 0v6"/></svg>;
const IcoClock = <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>;
const IcoClose = <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>;
const MB_NAV = [
  { id:'calendar', label:'Календарь',  ico:IcoCal },
  { id:'appts',    label:'Записи',     ico:IcoList },
  { id:'schedule', label:'Расписание', ico:IcoClock },
];

// =============================================================================
// ROOT — shared data layer, switches desktop / mobile by viewport
// =============================================================================
function useIsMobile() {
  const [m, setM] = useState(() => window.matchMedia('(max-width: 767px)').matches);
  useEffect(() => {
    const mq = window.matchMedia('(max-width: 767px)');
    const h = e => setM(e.matches);
    mq.addEventListener('change', h);
    return () => mq.removeEventListener('change', h);
  }, []);
  return m;
}

function App() {
  const pathMatch = window.location.pathname.match(/^\/doctor\/(\d+)/);
  const auth = (() => { try { return JSON.parse(localStorage.getItem('medflow_auth') || '{}'); } catch{ return {}; } })();
  const doctorId = pathMatch ? parseInt(pathMatch[1], 10) : (auth.id ?? 0);

  const isMobile = useIsMobile();

  const [view, setView]       = useState('calendar');
  const [theme, setTheme]     = useState('light');
  const [connected, setConnected] = useState(true);
  const [loading, setLoading] = useState(true);

  const [today, setToday]     = useState('2026-04-20');
  const [doctor, setDoctor]   = useState(null);
  const [clinics, setClinics] = useState({});
  const [myClinics, setMyClinics] = useState([]);
  const [schedule, setSchedule]   = useState([]);
  const [patients, setPatients]   = useState({});
  const [appts, setAppts]         = useState([]);

  const [modal, setModal] = useState(null);
  const [toast, setToast] = useState(null);
  const toastTimer = useRef(null);

  function showToast(msg, ok = true) {
    clearTimeout(toastTimer.current);
    setToast({ msg, ok });
    toastTimer.current = setTimeout(() => setToast(null), 3000);
  }

  useEffect(() => {
    const saved = localStorage.getItem('mf.doc.theme.v2') || 'light';
    setTheme(saved);
    document.documentElement.dataset.theme = saved;
  }, []);
  function toggleTheme() {
    const t = theme === 'light' ? 'dark' : 'light';
    setTheme(t);
    document.documentElement.dataset.theme = t;
    localStorage.setItem('mf.doc.theme.v2', t);
  }

  const loadAll = useCallback(async () => {
    setLoading(true);
    try {
      const [doc, todayRes, schedRaw, allRooms, allClinics, allSpecs, allPatients, doctorAppts] = await Promise.all([
        apiGet(`/doctors/${doctorId}`).catch(() => null),
        apiGet('/schedules/today').catch(() => null),
        apiGet(`/schedules/by-doctor/${doctorId}`).catch(() => []),
        apiGet('/rooms').catch(() => []),
        apiGet('/clinics').catch(() => []),
        apiGet('/specializations').catch(() => []),
        apiGet('/patients').catch(() => []),
        apiGet('/appointments').catch(() => []),
      ]);

      const todayDate = todayRes?.today || '2026-04-20';
      setToday(todayDate);

      const specName = doc ? (allSpecs.find(s => s.id === doc.specialization_id)?.name || '') : '';
      setDoctor(convertDoctor(doc, specName));

      const roomById   = Object.fromEntries((allRooms||[]).map(r => [r.id, r]));
      const clinicById = Object.fromEntries((allClinics||[]).map(c => [c.id, c]));

      const clinicIdsInOrder = [];
      const seenClinics = new Set();
      for (const s of (schedRaw || [])) {
        const room = roomById[s.roomId];
        if (!room) continue;
        if (!seenClinics.has(room.clinicId)) { seenClinics.add(room.clinicId); clinicIdsInOrder.push(room.clinicId); }
      }

      const clinicMap = {};
      const myClinicsArr = [];
      clinicIdsInOrder.forEach((cid, idx) => {
        const apiClinic = clinicById[cid];
        if (!apiClinic) return;
        const ix = idx % 3;
        const firstSched = schedRaw.find(s => roomById[s.roomId]?.clinicId === cid);
        const room = firstSched ? (roomById[firstSched.roomId]?.number || '—') : '—';
        const entry = {
          id: cid, name: apiClinic.name, address: apiClinic.address, room,
          color: COLOR_KEYS[ix], colorVar: COLOR_VARS[ix], tintVar: TINT_VARS[ix],
        };
        clinicMap[cid] = entry;
        myClinicsArr.push(entry);
      });

      setClinics(clinicMap);
      setMyClinics(myClinicsArr);

      const sched = (schedRaw || []).map(s => {
        const room = roomById[s.roomId];
        const cid  = room?.clinicId ?? -1;
        return {
          id: 's' + s.id, rawId: s.id, dayOfWeek: s.dayOfWeek, clinicId: cid,
          timeFrom: s.timeFrom, timeTo: s.timeTo, slotDuration: s.slotDurationMin || 30,
          room: room?.number || '—', roomId: s.roomId,
        };
      }).filter(s => s.clinicId !== -1);
      setSchedule(sched);

      const apptRows = (Array.isArray(doctorAppts) ? doctorAppts : [])
        .filter(a => a.doctorId === doctorId)
        .map(a => {
          const date      = a.scheduledAt?.slice(0, 10) || '';
          const timeStart = a.scheduledAt?.slice(11, 16) || '';
          let cid = -1, dur = 30;
          if (date && timeStart) {
            const dow = dowApp(date);
            const ts  = timeToMin(timeStart);
            const match = sched.find(s => s.dayOfWeek === dow && timeToMin(s.timeFrom) <= ts && ts < timeToMin(s.timeTo));
            if (match) { cid = match.clinicId; dur = match.slotDuration; }
          }
          return {
            id: 'a' + a.id, rawId: a.id, patId: a.patientId, clinicId: cid,
            date, timeStart, duration: dur, status: a.status, note: a.notes || '',
          };
        })
        .filter(a => a.date && a.timeStart);
      setAppts(apptRows);

      const refPatIds = new Set(apptRows.map(a => a.patId));
      const patMap = {};
      for (const p of (Array.isArray(allPatients) ? allPatients : [])) {
        if (refPatIds.has(p.id)) patMap[p.id] = convertPatient(p);
      }
      setPatients(patMap);

      setConnected(true);
    } catch (e) {
      setConnected(false);
    }
    setLoading(false);
  }, [doctorId]);

  useEffect(() => { loadAll(); }, [loadAll]);

  async function updateAppt(internalId, patch) {
    const a = appts.find(x => x.id === internalId);
    if (!a) return;
    try {
      if (patch.status !== undefined && patch.status !== a.status) {
        await apiPatch(`/appointments/${a.rawId}/status`, { status: patch.status });
      }
      if (patch.note !== undefined && patch.note !== a.note) {
        await apiPatch(`/appointments/${a.rawId}/notes`, { notes: patch.note });
      }
      await loadAll();
      showToast('Запись обновлена');
    } catch (e) {
      showToast(e.message || 'Ошибка', false);
    }
  }

  function logout() {
    localStorage.removeItem('medflow_auth');
    window.location.href = '/';
  }

  const shared = {
    doctorId, view, setView, theme, toggleTheme, connected, loading, loadAll,
    today, doctor, clinics, myClinics, schedule, patients, appts,
    modal, setModal, updateAppt, toast, logout,
  };

  return isMobile ? <MobileShell {...shared} /> : <DesktopShell {...shared} />;
}

// =============================================================================
// DESKTOP SHELL
// =============================================================================
function DesktopShell(props) {
  const { view, setView, theme, toggleTheme, connected, loading, loadAll,
    today, doctor, clinics, myClinics, schedule, patients, appts,
    modal, setModal, updateAppt, toast, logout } = props;

  return (
    <div className="dk-root">
      <div className="app">
        <aside className="sidebar">
          <div className="brand">
            <div className="brand-mark">М</div>
            <span>MedFlow</span>
          </div>

          <div className="doc-card">
            <div className="row">
              <div className="doc-avatar">{doctor?.initials || '??'}</div>
              <div style={{minWidth:0}}>
                <div className="doc-name">{doctor?.short || (loading ? 'Загрузка…' : 'Врач не найден')}</div>
                <div className="doc-role">
                  {doctor ? (doctor.specialty || 'Специальность не указана') : ''}
                  {doctor ? ` · ID ${doctor.id}` : ''}
                </div>
              </div>
            </div>
          </div>

          <div className="clinic-list">
            <div className="cl-label">Я работаю в</div>
            {myClinics.length === 0
              ? <div style={{fontSize:11, color:'var(--ink-3)', padding:'4px 8px'}}>{loading ? 'Загрузка…' : 'Нет назначенных клиник'}</div>
              : myClinics.map(c => (
                <div key={c.id} className="clinic-row">
                  <div className="clinic-dot" style={{background:`var(${c.colorVar})`}}></div>
                  <div style={{minWidth:0, flex:1}}>
                    <div className="clinic-name">{c.name}</div>
                    <div className="clinic-room">каб. № {c.room}</div>
                  </div>
                </div>
              ))
            }
          </div>

          <div className="side-label">Меню</div>
          {DK_NAV.map(n => (
            <div key={n.id} className={`nav-item${view===n.id?' active':''}`} onClick={() => setView(n.id)}>
              <span className="ico">{n.ico}</span>
              <span>{n.label}</span>
              {n.id==='appts' && <span className="cnt">{appts.length}</span>}
              {n.id==='schedule' && <span className="cnt">{schedule.length}</span>}
            </div>
          ))}

          <div className="sidebar-foot">
            <div className="logout-btn" onClick={logout}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              <span>Выйти</span>
            </div>
          </div>
        </aside>

        <div className="content">
          <div className="topbar">
            <div className="breadcrumb">
              <span>MedFlow</span>
              <span className="sep">/</span>
              <span>Кабинет врача</span>
              <span className="sep">/</span>
              <span className="here">{VIEW_LABELS[view]}</span>
            </div>
            <div className="topbar-right">
              <button className="theme-toggle" onClick={toggleTheme}>
                <span className="tgl"></span>
                <span>{theme==='dark'?'Тёмная':'Светлая'}</span>
              </button>
            </div>
          </div>

          {!connected && (
            <div style={{background:'var(--warn-soft)', borderBottom:'1px solid var(--warn)', padding:'7px 22px', fontSize:12, color:'var(--warn)', display:'flex', alignItems:'center', gap:8, flexShrink:0}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
              Нет соединения с сервером — данные могут быть неактуальны
              <button className="btn ghost" style={{padding:'2px 8px',fontSize:11}} onClick={loadAll}>Повторить</button>
            </div>
          )}

          <div className="scroll-area" style={{display:'flex', flexDirection:'column'}}>
            {loading ? (
              <div style={{display:'grid', placeItems:'center', height:'60vh', color:'var(--ink-3)', fontSize:14}}>Загрузка данных…</div>
            ) : (
              <>
                {view==='calendar' && <DkCalendarView today={today} schedule={schedule} clinics={clinics} patients={patients} appts={appts} onApptClick={a => setModal({type:'appt', id:a.id})} />}
                {view==='appts'    && <DkAppointmentsView today={today} clinics={clinics} myClinics={myClinics} patients={patients} appts={appts} onApptClick={a => setModal({type:'appt', id:a.id})} />}
                {view==='schedule' && <DkScheduleView today={today} schedule={schedule} clinics={clinics} myClinics={myClinics} />}
              </>
            )}
          </div>
        </div>

        {modal?.type === 'appt' && (() => {
          const a = appts.find(x => x.id === modal.id);
          if (!a) return null;
          return (
            <DkApptModal appt={a} today={today} clinics={clinics} patients={patients}
              onClose={() => setModal(null)}
              onSave={(patch) => { updateAppt(modal.id, patch); setModal(null); }}
              onShowPatient={(patId) => setModal({type:'patient', patId, returnTo:modal})} />
          );
        })()}
        {modal?.type === 'patient' && (() => {
          const p = patients[modal.patId];
          if (!p) return null;
          return (
            <DkPatientModal patient={p} today={today} clinics={clinics}
              appts={appts.filter(a => a.patId === modal.patId)}
              onClose={() => modal.returnTo ? setModal(modal.returnTo) : setModal(null)} />
          );
        })()}

        {toast && <div className={`toast ${toast.ok?'ok':'err'}`}>{toast.msg}</div>}
      </div>
    </div>
  );
}

// ── desktop calendar ──
const PXM = 2;
const DAY_H = 24 * 60 * PXM;
const DK_TIME_W = 56;
const DK_DAYS_DEFAULT = 3;
const DK_COL_W = 320;

function DkCalendarView({ today, schedule, clinics, patients, appts, onApptClick }) {
  const [anchorDate, setAnchorDate] = useState(today);
  const [daysVisible, setDaysVisible] = useState(DK_DAYS_DEFAULT);
  const scrollRef = useRef(null);

  useEffect(() => { setAnchorDate(today); }, [today]);

  const visibleDates = Array.from({length:daysVisible}, (_,i) => addDays(anchorDate, i));

  const workMins = visibleDates.flatMap(d => {
    const dow = dowApp(d);
    return schedule.filter(s => s.dayOfWeek === dow).flatMap(s => [timeToMin(s.timeFrom), timeToMin(s.timeTo)]);
  });
  const earliest = workMins.length ? Math.min(...workMins) : 9*60;

  useLayoutEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = Math.max(0, earliest * PXM - 40);
  }, [anchorDate, daysVisible]);

  const halfSlots = Array.from({length:48}, (_, i) => i*30);
  function shiftDays(delta) { setAnchorDate(addDays(anchorDate, delta)); }
  const dayChoices = [1, 2, 3, 5];

  return (
    <div className="cal-page">
      <div className="cal-nav">
        <div className="nav-arrows">
          <button className="btn ghost" style={{padding:'5px 10px', minWidth:32}} onClick={() => shiftDays(-1)} title="День назад">←</button>
          <button className="btn ghost" style={{padding:'5px 10px', fontSize:12}} onClick={() => setAnchorDate(today)}>Сегодня</button>
          <button className="btn ghost" style={{padding:'5px 10px', minWidth:32}} onClick={() => shiftDays(1)} title="День вперёд">→</button>
        </div>

        <div>
          <span className="day-label">{fmtDateLong(visibleDates[0])}</span>
          {daysVisible > 1 && <span className="day-sub">— {fmtDateLong(visibleDates[daysVisible-1])}</span>}
        </div>

        <input type="date" className="input-el" style={{width:148}}
          value={anchorDate} onChange={e => e.target.value && setAnchorDate(e.target.value)} />

        <div style={{display:'flex', gap:4, alignItems:'center', marginLeft:'8px'}}>
          <span style={{fontSize:11, color:'var(--ink-3)', textTransform:'uppercase', letterSpacing:'.05em', marginRight:4}}>Дней</span>
          {dayChoices.map(n => (
            <button key={n} className="btn ghost"
              style={{padding:'4px 9px', fontSize:12, borderColor: n===daysVisible ? 'var(--accent)' : 'var(--line)', background: n===daysVisible ? 'var(--accent-tint)' : 'transparent', color: n===daysVisible ? 'var(--accent)' : 'var(--ink-2)'}}
              onClick={() => setDaysVisible(n)}>{n}</button>
          ))}
        </div>

        <div className="legend">
          <span><span className="tag ok dot"></span>Запланирована</span>
          <span><span className="tag info dot"></span>Завершена</span>
          <span><span className="tag err dot"></span>Отменена</span>
        </div>
      </div>

      <div className="cal-scroll" ref={scrollRef}>
        <div className="cal-rows">
          <div className="cal-row-head">
            <div style={{width:DK_TIME_W, flexShrink:0, background:'var(--bg-soft)', borderRight:'1px solid var(--line)'}}></div>
            {visibleDates.map(date => {
              const isToday = date === today;
              const dow = dowApp(date);
              const sched = schedule.filter(s => s.dayOfWeek === dow).sort((a,b)=>timeToMin(a.timeFrom)-timeToMin(b.timeFrom));
              const d = new Date(date+'T00:00:00');
              return (
                <div key={date} className={`day-head${isToday?' today':''}`} style={{width:DK_COL_W}}>
                  <div className="dh-day">{DOW_FULL[d.getDay()]}</div>
                  <div className="dh-num">{d.getDate()} {MONTH_GEN[d.getMonth()]}</div>
                  <div className="dh-clinics">
                    {sched.length === 0
                      ? <span style={{fontSize:11, color:'var(--ink-3)'}}>Выходной</span>
                      : sched.map(s => {
                          const c = clinics[s.clinicId];
                          if (!c) return null;
                          return (
                            <span key={s.id} className="clinic-pill" style={{
                              background:`var(${c.tintVar})`, color:`var(${c.colorVar})`, borderColor:`var(${c.colorVar})`}}>
                              <span className="cd" style={{background:`var(${c.colorVar})`}}></span>
                              {c.name.split(',')[0]} · {s.timeFrom}–{s.timeTo}
                            </span>
                          );
                        })
                    }
                  </div>
                </div>
              );
            })}
          </div>

          <div className="cal-row-body">
            <div className="time-col" style={{width:DK_TIME_W, height:DAY_H}}>
              {halfSlots.map(totalMin => {
                const hh = String(Math.floor(totalMin/60)).padStart(2,'0');
                const isHalf = (totalMin % 60) === 30;
                return (
                  <div key={totalMin} className={isHalf ? 'time-label time-label-half' : 'time-label'} style={{top: totalMin*PXM}}>
                    {isHalf ? hh+':30' : hh+':00'}
                  </div>
                );
              })}
            </div>

            {visibleDates.map(date => {
              const dow = dowApp(date);
              const sched = schedule.filter(s => s.dayOfWeek === dow);
              const dayAppts = appts.filter(a => a.date === date);

              return (
                <div key={date} className="day-col" style={{width:DK_COL_W, height:DAY_H}}>
                  {sched.map(s => {
                    const c = clinics[s.clinicId];
                    if (!c) return null;
                    const fromMin = timeToMin(s.timeFrom);
                    const toMin = timeToMin(s.timeTo);
                    return (
                      <div key={s.id} className={`work-window ${c.color}`}
                        style={{top:fromMin*PXM, height:(toMin-fromMin)*PXM, zIndex:1}}>
                        <span className="work-window-tag" style={{color:`var(${c.colorVar})`}}>
                          {c.name.split(',')[0]} · каб. № {s.room}
                        </span>
                      </div>
                    );
                  })}

                  {halfSlots.map(totalMin => {
                    if (totalMin === 0) return null;
                    const isHalf = (totalMin % 60) === 30;
                    return <div key={totalMin} className={isHalf ? 'half-line' : 'hour-line'} style={{top:totalMin*PXM, zIndex:2}} />;
                  })}

                  {dayAppts.map(a => {
                    const startMin = timeToMin(a.timeStart);
                    const endMin = startMin + (a.duration || 30);
                    const pat = patients[a.patId];
                    const c = clinics[a.clinicId];
                    const cls = 'appt s-' + (a.status === 0 ? 'planned' : a.status === 1 ? 'done' : 'cancelled');
                    const dur = endMin - startMin;
                    return (
                      <div key={a.id} className={cls}
                        style={{top: startMin*PXM + 1, height: dur*PXM - 2, zIndex:3}}
                        onClick={(e) => { e.stopPropagation(); onApptClick(a); }}>
                        <div className="pname">{pat ? shortName(pat) : 'Пациент #' + a.patId}</div>
                        <div className="ptime">{a.timeStart}–{minToTime(endMin)}</div>
                        {dur >= 40 && c && <div className="pdetail">{c.name.split(',')[0]} · каб. № {c.room}</div>}
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── desktop appointments ──
function DkAppointmentsView({ today, clinics, myClinics, patients, appts, onApptClick }) {
  const [search, setSearch] = useState('');
  const [statusFilter, setStatusFilter] = useState('all');
  const [clinicFilter, setClinicFilter] = useState('all');

  const filtered = useMemo(() => {
    return appts
      .filter(a => {
        if (statusFilter === 'upcoming' && !(a.status === 0 && a.date >= today)) return false;
        if (statusFilter === 'done' && a.status !== 1) return false;
        if (statusFilter === 'cancelled' && a.status !== 2) return false;
        if (clinicFilter !== 'all' && String(a.clinicId) !== clinicFilter) return false;
        if (search) {
          const p = patients[a.patId];
          if (!p) return false;
          const haystack = (fullName(p) + ' ' + (p.insurance||'') + ' ' + (p.phone||'')).toLowerCase();
          if (!haystack.includes(search.toLowerCase())) return false;
        }
        return true;
      })
      .sort((a,b) => (b.date + b.timeStart).localeCompare(a.date + a.timeStart));
  }, [appts, search, statusFilter, clinicFilter, patients, today]);

  const counts = {
    total: appts.length,
    upcoming: appts.filter(a => a.status === 0 && a.date >= today).length,
    done: appts.filter(a => a.status === 1).length,
    cancelled: appts.filter(a => a.status === 2).length,
  };

  return (
    <div className="main">
      <div className="page-head">
        <div>
          <h1>Мои записи</h1>
          <div className="page-sub">История всех приёмов · {appts.length} записей</div>
        </div>
      </div>

      <div className="stat-grid">
        <div className="stat highlight"><span className="label">Предстоящие</span><div className="num">{counts.upcoming}</div><div className="sub">запланировано</div></div>
        <div className="stat"><span className="label">Завершено</span><div className="num">{counts.done}</div><div className="sub">всего приёмов</div></div>
        <div className="stat"><span className="label">Отменено</span><div className="num">{counts.cancelled}</div><div className="sub">пропущено / отменено</div></div>
        <div className="stat"><span className="label">Всего</span><div className="num">{counts.total}</div><div className="sub">за всё время</div></div>
      </div>

      <div className="card">
        <div className="card-head">
          <div style={{display:'flex', alignItems:'center', gap:8, background:'var(--bg-soft)', border:'1px solid var(--line-soft)', borderRadius:'var(--radius-sm)', padding:'5px 10px', flex:1, maxWidth:340}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
            <input style={{border:'none', background:'transparent', font:'inherit', fontSize:13, outline:'none', flex:1, color:'var(--ink)'}}
              placeholder="Поиск по ФИО, полису, телефону…"
              value={search} onChange={e => setSearch(e.target.value)} />
          </div>
          <select className="input-el status-select" style={{width:160, padding:'5px 28px 5px 10px'}} value={clinicFilter} onChange={e => setClinicFilter(e.target.value)}>
            <option value="all">Все клиники</option>
            {myClinics.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
          <select className="input-el status-select" style={{width:170, padding:'5px 28px 5px 10px'}} value={statusFilter} onChange={e => setStatusFilter(e.target.value)}>
            <option value="all">Все статусы</option>
            <option value="upcoming">Предстоящие</option>
            <option value="done">Завершённые</option>
            <option value="cancelled">Отменённые</option>
          </select>
          <span className="head-note" style={{marginLeft:'auto'}}>{filtered.length} {filtered.length===1?'запись':'записей'}</span>
        </div>

        {filtered.length === 0
          ? <div className="empty">Записей не найдено</div>
          : (
            <table className="list">
              <thead>
                <tr>
                  <th style={{width:120}}>Дата</th>
                  <th style={{width:90}}>Время</th>
                  <th>Пациент</th>
                  <th>Клиника</th>
                  <th style={{width:140}}>Статус</th>
                  <th>Заметка</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(a => {
                  const pat = patients[a.patId];
                  const c = clinics[a.clinicId];
                  const endMin = timeToMin(a.timeStart) + (a.duration || 30);
                  const statusTag = a.status === 0 ? <span className="tag ok dot">Запланирована</span>
                                  : a.status === 1 ? <span className="tag info dot">Завершена</span>
                                  : <span className="tag err dot">Отменена</span>;
                  return (
                    <tr key={a.id} onClick={() => onApptClick(a)}>
                      <td>
                        <div style={{fontWeight:500}}>{fmtDateShort(a.date)}</div>
                        <div style={{fontSize:11, color:'var(--ink-3)'}}>{DOW_FULL[new Date(a.date+'T00:00:00').getDay()]}</div>
                      </td>
                      <td className="mono" style={{fontSize:12}}>{a.timeStart}–{minToTime(endMin)}</td>
                      <td className="cell-name">
                        <div className="av">{pat ? initials(pat) : '??'}</div>
                        <div>
                          <div style={{fontWeight:500}}>{pat ? fullName(pat) : 'Пациент #' + a.patId}</div>
                          {pat && <div className="mono" style={{fontSize:11, color:'var(--ink-3)'}}>{pat.dob} · {pat.gender}</div>}
                        </div>
                      </td>
                      <td>
                        {c ? (
                          <div style={{display:'flex', alignItems:'center', gap:6, fontSize:12}}>
                            <span style={{width:8, height:8, borderRadius:2, background:`var(${c.colorVar})`, flexShrink:0}}></span>
                            <div>
                              <div>{c.name}</div>
                              <div style={{fontSize:11, color:'var(--ink-3)'}} className="mono">каб. № {c.room}</div>
                            </div>
                          </div>
                        ) : <span style={{color:'var(--ink-4)'}}>—</span>}
                      </td>
                      <td>{statusTag}</td>
                      <td style={{fontSize:12, color: a.note ? 'var(--ink-2)' : 'var(--ink-4)', maxWidth:280}}>
                        {a.note ? (a.note.length > 60 ? a.note.slice(0,60)+'…' : a.note) : '—'}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )
        }
      </div>
    </div>
  );
}

// ── desktop schedule ──
function DkScheduleView({ today, schedule, clinics, myClinics }) {
  const [weekStart, setWeekStart] = useState(getMondayIso(today));
  useEffect(() => { setWeekStart(getMondayIso(today)); }, [today]);

  const weekDates = Array.from({length:7}, (_, i) => addDays(weekStart, i));
  const totalHours = schedule.reduce((sum, s) => sum + (timeToMin(s.timeTo) - timeToMin(s.timeFrom))/60, 0);

  const byDow = {};
  schedule.forEach(s => { if (!byDow[s.dayOfWeek]) byDow[s.dayOfWeek] = []; byDow[s.dayOfWeek].push(s); });
  Object.values(byDow).forEach(arr => arr.sort((a,b) => timeToMin(a.timeFrom) - timeToMin(b.timeFrom)));

  function shiftWeek(delta) { setWeekStart(addDays(weekStart, delta * 7)); }

  return (
    <div className="main">
      <div className="page-head">
        <div>
          <h1>Моё расписание</h1>
          <div className="page-sub">Постоянное рабочее расписание · всего {totalHours} часов в неделю</div>
        </div>
        <div className="head-actions">
          <button className="btn ghost" onClick={() => shiftWeek(-1)}>← Пред.</button>
          <button className="btn ghost" onClick={() => setWeekStart(getMondayIso(today))}>Текущая неделя</button>
          <button className="btn ghost" onClick={() => shiftWeek(1)}>След. →</button>
        </div>
      </div>

      <div className="stat-grid" style={{gridTemplateColumns:'repeat(3, 1fr)'}}>
        <div className="stat highlight"><span className="label">Часов в неделю</span><div className="num">{totalHours}</div><div className="sub">{schedule.length} рабочих смен</div></div>
        <div className="stat"><span className="label">Клиник</span><div className="num">{myClinics.length}</div><div className="sub">в этом расписании</div></div>
        <div className="stat"><span className="label">Слот приёма</span><div className="num">{schedule[0]?.slotDuration || 30} <span style={{fontSize:14, color:'var(--ink-3)'}}>мин</span></div><div className="sub">средняя длительность</div></div>
      </div>

      <div className="card" style={{marginBottom:18}}>
        <div className="card-head">
          <h3>Неделя {fmtDateShort(weekStart)} – {fmtDateShort(addDays(weekStart, 6))}</h3>
          <span className="head-note">Расписание повторяется по дням недели</span>
        </div>
        <div style={{padding:14}}>
          <div className="week-grid">
            <div className="wg-head" style={{fontSize:11, color:'var(--ink-3)'}}>Время</div>
            {weekDates.map((d, i) => {
              const date = new Date(d+'T00:00:00');
              const isToday = d === today;
              return (
                <div key={d} className={`wg-head${isToday?' today':''}`}>
                  <div className="wgh-dow">{DOW_MONDAY[i]}</div>
                  <div className="wgh-num">{date.getDate()}</div>
                </div>
              );
            })}

            <div className="wg-time">Утро<br/>День<br/>Вечер</div>
            {[1,2,3,4,5,6,7].map(dow => {
              const shifts = byDow[dow] || [];
              return (
                <div key={dow} className="wg-cell">
                  {shifts.length === 0
                    ? <div style={{color:'var(--ink-4)', fontSize:11, textAlign:'center', paddingTop:14}}>Выходной</div>
                    : shifts.map(s => {
                        const c = clinics[s.clinicId];
                        const hours = (timeToMin(s.timeTo) - timeToMin(s.timeFrom))/60;
                        const colorVar = c ? c.colorVar : '--accent';
                        const tintVar  = c ? c.tintVar  : '--accent-tint';
                        return (
                          <div key={s.id} className="wg-shift" style={{borderLeftColor:`var(${colorVar})`, background:`var(${tintVar})`}}>
                            <div className="wgs-time" style={{color:`var(${colorVar})`}}>{s.timeFrom} – {s.timeTo}</div>
                            <div className="wgs-clinic">{c ? c.name : '—'}</div>
                            <div className="wgs-room">каб. № {s.room} · {hours} ч</div>
                          </div>
                        );
                      })
                  }
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-head"><h3>Мои клиники</h3></div>
        <div style={{padding:14, display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(280px, 1fr))', gap:10}}>
          {myClinics.map(c => {
            const myShifts = schedule.filter(s => s.clinicId === c.id);
            const hrs = myShifts.reduce((sum,s) => sum + (timeToMin(s.timeTo) - timeToMin(s.timeFrom))/60, 0);
            return (
              <div key={c.id} style={{padding:'12px 14px', background:`var(${c.tintVar})`, borderLeft:`3px solid var(${c.colorVar})`, borderRadius:'var(--radius-sm)'}}>
                <div style={{fontWeight:600, fontSize:13.5, color:`var(${c.colorVar})`}}>{c.name}</div>
                <div style={{fontSize:12, color:'var(--ink-2)', marginTop:2}}>{c.address}</div>
                <div style={{fontSize:12, marginTop:8, display:'flex', gap:14, color:'var(--ink-2)'}}>
                  <span><b className="mono">{myShifts.length}</b> смен</span>
                  <span><b className="mono">{hrs} ч</b> в неделю</span>
                  <span className="mono" style={{color:'var(--ink-3)'}}>каб. № {c.room}</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── desktop modals ──
function DkApptModal({ appt, today, clinics, patients, onClose, onSave, onShowPatient }) {
  const [status, setStatus] = useState(appt.status);
  const [note, setNote] = useState(appt.note || '');
  const dirty = status !== appt.status || note !== (appt.note || '');

  useEffect(() => {
    const h = (e) => e.key === 'Escape' && onClose();
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  const pat = patients[appt.patId];
  const c = clinics[appt.clinicId];
  const endMin = timeToMin(appt.timeStart) + (appt.duration || 30);

  return (
    <div className="modal-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-box" style={{maxWidth:540}}>
        <div className="modal-head">
          <div style={{flex:1}}>
            <div className="modal-title">Запись на приём</div>
            <div className="modal-sub">{fmtDateLong(appt.date)} · {appt.timeStart}–{minToTime(endMin)}</div>
          </div>
          <button className="icon-btn" onClick={onClose}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <div className="modal-body">
          <div className="field">
            <label>Пациент</label>
            <div style={{display:'flex', alignItems:'center', gap:10, padding:'8px 10px', border:'1px solid var(--line)', borderRadius:'var(--radius-sm)', background:'var(--bg-soft)'}}>
              <div className="av" style={{width:32, height:32, fontSize:11}}>{pat ? initials(pat) : '??'}</div>
              <div style={{flex:1, minWidth:0}}>
                <div style={{fontWeight:600}}>
                  {pat ? (
                    <span style={{color:'var(--accent)', cursor:'pointer', textDecoration:'underline', textDecorationStyle:'dashed', textUnderlineOffset:2}}
                      onClick={() => onShowPatient(pat.id)}>{fullName(pat)}</span>
                  ) : ('Пациент #' + appt.patId)}
                </div>
                {pat && <div className="mono" style={{fontSize:11, color:'var(--ink-3)'}}>{pat.dob} · {pat.gender} · ОМС {pat.insurance}</div>}
              </div>
            </div>
          </div>

          <div className="field">
            <label>Клиника и кабинет</label>
            <div style={{display:'flex', alignItems:'center', gap:10, padding:'8px 10px', border:'1px solid var(--line)', borderRadius:'var(--radius-sm)'}}>
              {c && <span style={{width:10, height:10, borderRadius:2, background:`var(${c.colorVar})`, flexShrink:0}}></span>}
              <div style={{flex:1}}>
                <div style={{fontWeight:500}}>{c?.name || '—'}</div>
                {c && <div style={{fontSize:11.5, color:'var(--ink-3)'}}>{c.address}</div>}
              </div>
              {c && <span className="mono" style={{fontSize:12, padding:'2px 8px', background:'var(--bg-soft)', borderRadius:4, color:'var(--ink-3)'}}>каб. № {c.room}</span>}
            </div>
          </div>

          <div className="field">
            <label>Статус записи</label>
            <select className="input-el status-select" value={status} onChange={e => setStatus(parseInt(e.target.value))}>
              <option value={0}>Запланирована</option>
              <option value={1}>Завершена</option>
              <option value={2}>Отменена</option>
            </select>
          </div>

          <div className="field">
            <label>Заметка к приёму</label>
            <textarea className="input-el" rows={4} value={note} onChange={e => setNote(e.target.value)} placeholder="Жалобы, осмотр, диагноз, рекомендации, назначения…" />
          </div>
        </div>
        <div className="modal-foot">
          <button className="btn ghost" onClick={onClose}>Закрыть</button>
          <button className="btn primary" disabled={!dirty} onClick={() => onSave({status, note})} style={{marginLeft:'auto'}}>Сохранить</button>
        </div>
      </div>
    </div>
  );
}

function DkPatientModal({ patient, today, clinics, appts, onClose }) {
  useEffect(() => {
    const h = (e) => e.key === 'Escape' && onClose();
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  const sorted = appts.slice().sort((a,b) => (b.date+b.timeStart).localeCompare(a.date+a.timeStart));

  return (
    <div className="modal-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-box" style={{maxWidth:640}}>
        <div className="p-header">
          <div className="p-avatar">{initials(patient)}</div>
          <div style={{flex:1, minWidth:0}}>
            <div className="p-name">{fullName(patient)}</div>
            <div className="p-meta">{patient.gender} · {calcAge(patient.dob, today)} лет · {patient.dob}</div>
          </div>
          <button className="icon-btn" onClick={onClose} style={{color:'var(--ink-2)'}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <div className="modal-body">
          <div className="info-grid">
            <div className="info-item"><div className="ilabel">Телефон</div><div className="ival mono">{patient.phone}</div></div>
            <div className="info-item"><div className="ilabel">Полис ОМС</div><div className="ival mono">{patient.insurance}</div></div>
          </div>

          <div style={{display:'flex', alignItems:'baseline', gap:10, marginTop:6, marginBottom:10}}>
            <div style={{fontSize:13.5, fontWeight:600}}>История посещений</div>
            <div style={{fontSize:12, color:'var(--ink-3)'}}>всего {sorted.length}</div>
          </div>

          {sorted.length === 0
            ? <div className="empty" style={{padding:20}}>Нет посещений</div>
            : (
              <div className="timeline">
                {sorted.map(a => {
                  const c = clinics[a.clinicId];
                  const endMin = timeToMin(a.timeStart) + (a.duration || 30);
                  const statusTag = a.status === 0 ? <span className="tag ok" style={{fontSize:10}}>Запланирована</span>
                                  : a.status === 1 ? <span className="tag info" style={{fontSize:10}}>Завершена</span>
                                  : <span className="tag err" style={{fontSize:10}}>Отменена</span>;
                  return (
                    <div key={a.id} className="tl-item">
                      <div className="tl-date">{fmtIso(a.date)} · {a.timeStart}–{minToTime(endMin)} · {statusTag}</div>
                      <div className="tl-title" style={{display:'flex', alignItems:'center', gap:8}}>
                        {c && <span style={{width:8, height:8, borderRadius:2, background:`var(${c.colorVar})`}}></span>}
                        {c ? `${c.name} · каб. № ${c.room}` : '—'}
                      </div>
                      {a.note && <div className="tl-note">{a.note}</div>}
                    </div>
                  );
                })}
              </div>
            )
          }
        </div>
      </div>
    </div>
  );
}

function MobileShell(props) {
  const { view, setView, theme, toggleTheme, connected, loading, loadAll,
    today, doctor, clinics, myClinics, schedule, patients, appts,
    modal, setModal, updateAppt, toast, logout } = props;

  const [profileOpen, setProfileOpen] = useState(false);
  const apptCount = appts.length;

  return (
    <div className="mb-root">
      <div className="device">
        <header className="topbar">
          <div className="topbar-inner">
            <div className="brand-mark">М</div>
            <div className="tb-title">
              <span className="t1">{VIEW_LABELS[view]}</span>
              <span className="t2">{doctor ? doctor.short : 'Кабинет врача'}</span>
            </div>
            <div className="tb-right">
              <button className="avatar-btn" onClick={() => setProfileOpen(true)} aria-label="Профиль">
                {doctor?.initials || '??'}
              </button>
            </div>
          </div>
          {!connected && (
            <div className="conn-banner">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
              Нет соединения с сервером
              <button className="retry" onClick={loadAll}>Повторить</button>
            </div>
          )}
        </header>

        <div className="stage">
          {loading ? (
            <div className="loading-screen">Загрузка данных…</div>
          ) : (
            <>
              {view==='calendar' && <MbCalendarView today={today} schedule={schedule} clinics={clinics} patients={patients} appts={appts} onApptClick={a => setModal({type:'appt', id:a.id})} />}
              {view==='appts'    && <MbAppointmentsView today={today} clinics={clinics} myClinics={myClinics} patients={patients} appts={appts} onApptClick={a => setModal({type:'appt', id:a.id})} />}
              {view==='schedule' && <MbScheduleView today={today} schedule={schedule} clinics={clinics} myClinics={myClinics} />}
            </>
          )}
        </div>

        <nav className="tabbar">
          {MB_NAV.map(n => (
            <button key={n.id} className={`tab${view===n.id?' active':''}`} onClick={() => setView(n.id)}>
              {n.ico}
              <span className="lbl">{n.label}</span>
              {n.id==='appts' && apptCount > 0 && <span className="cnt">{apptCount}</span>}
            </button>
          ))}
        </nav>

        {profileOpen && (
          <MbProfileSheet doctor={doctor} myClinics={myClinics} theme={theme}
            loading={loading} onToggleTheme={toggleTheme} onLogout={logout}
            onClose={() => setProfileOpen(false)} />
        )}

        {modal?.type === 'appt' && (() => {
          const a = appts.find(x => x.id === modal.id);
          if (!a) return null;
          return (
            <MbApptSheet appt={a} today={today} clinics={clinics} patients={patients}
              onClose={() => setModal(null)}
              onSave={(patch) => { updateAppt(modal.id, patch); setModal(null); }}
              onShowPatient={(patId) => setModal({type:'patient', patId, returnTo:modal})} />
          );
        })()}
        {modal?.type === 'patient' && (() => {
          const p = patients[modal.patId];
          if (!p) return null;
          return (
            <MbPatientSheet patient={p} today={today} clinics={clinics}
              appts={appts.filter(a => a.patId === modal.patId)}
              onClose={() => modal.returnTo ? setModal(modal.returnTo) : setModal(null)} />
          );
        })()}

        {toast && <div className={`toast ${toast.ok?'ok':'err'}`}>{toast.msg}</div>}
      </div>
    </div>
  );
}

const MB_TIME_W = 50;

function MbCalendarView({ today, schedule, clinics, patients, appts, onApptClick }) {
  const [date, setDate] = useState(today);
  const scrollRef = useRef(null);
  useEffect(() => { setDate(today); }, [today]);

  const dow = dowApp(date);
  const sched = useMemo(
    () => schedule.filter(s => s.dayOfWeek === dow).sort((a,b)=>timeToMin(a.timeFrom)-timeToMin(b.timeFrom)),
    [schedule, dow]
  );
  const dayAppts = useMemo(
    () => appts.filter(a => a.date === date).sort((a,b)=>timeToMin(a.timeStart)-timeToMin(b.timeStart)),
    [appts, date]
  );

  const workMins = sched.flatMap(s => [timeToMin(s.timeFrom), timeToMin(s.timeTo)]);
  const earliest = workMins.length ? Math.min(...workMins) : 8*60;
  useLayoutEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = Math.max(0, earliest * PXM - 30);
  }, [date]);

  const halfSlots = Array.from({length:48}, (_, i) => i*30);
  const monday = getMondayIso(date);
  const weekDates = Array.from({length:7}, (_, i) => addDays(monday, i));
  const apptDates = useMemo(() => new Set(appts.map(a => a.date)), [appts]);
  const d0 = new Date(date+'T00:00:00');

  return (
    <div className="cal-page">
      <div className="cal-nav">
        <div className="cal-nav-top">
          <button className="arrow" onClick={() => setDate(addDays(date,-1))} aria-label="Назад">←</button>
          <div className="cal-day-label">
            <div className="cdl-1">{DOW_FULL[d0.getDay()]}, {d0.getDate()} {MONTH_GEN[d0.getMonth()]}</div>
            <div className="cdl-2">{dayAppts.length ? `${dayAppts.length} ${plural(dayAppts.length,'запись','записи','записей')}` : 'нет записей'}</div>
          </div>
          <button className="arrow" onClick={() => setDate(addDays(date,1))} aria-label="Вперёд">→</button>
        </div>

        <div className="week-strip">
          {weekDates.map(wd => {
            const wdd = new Date(wd+'T00:00:00');
            const cls = ['wday'];
            if (wd === date) cls.push('sel');
            if (wd === today) cls.push('today');
            if (apptDates.has(wd)) cls.push('has');
            return (
              <div key={wd} className={cls.join(' ')} onClick={() => setDate(wd)}>
                <span className="dn">{DOW_SHORT[wdd.getDay()]}</span>
                <span className="dd">{wdd.getDate()}</span>
              </div>
            );
          })}
        </div>

        {sched.length > 0 && (
          <div className="cal-clinics">
            {sched.map(s => {
              const c = clinics[s.clinicId];
              if (!c) return null;
              return (
                <span key={s.id} className="clinic-pill" style={{background:`var(${c.tintVar})`, color:`var(${c.colorVar})`, borderColor:`var(${c.colorVar})`}}>
                  <span className="cd" style={{background:`var(${c.colorVar})`}}></span>
                  {c.name.split(',')[0]} · {s.timeFrom}–{s.timeTo}
                </span>
              );
            })}
          </div>
        )}
      </div>

      <div className="cal-scroll" ref={scrollRef}>
        <div className="cal-track">
          <div className="time-col" style={{width:MB_TIME_W, height:DAY_H}}>
            {halfSlots.map(totalMin => {
              const hh = String(Math.floor(totalMin/60)).padStart(2,'0');
              const isHalf = (totalMin % 60) === 30;
              return (
                <div key={totalMin} className={isHalf ? 'time-label time-label-half' : 'time-label'} style={{top: totalMin*PXM}}>
                  {isHalf ? hh+':30' : hh+':00'}
                </div>
              );
            })}
          </div>

          <div className="day-col" style={{height:DAY_H}}>
            {sched.map(s => {
              const c = clinics[s.clinicId];
              if (!c) return null;
              const fromMin = timeToMin(s.timeFrom), toMin = timeToMin(s.timeTo);
              return (
                <div key={s.id} className={`work-window ${c.color}`} style={{top:fromMin*PXM, height:(toMin-fromMin)*PXM, zIndex:1}}>
                  <span className="work-window-tag">{c.name.split(',')[0]} · каб. № {s.room}</span>
                </div>
              );
            })}

            {halfSlots.map(totalMin => {
              if (totalMin === 0) return null;
              const isHalf = (totalMin % 60) === 30;
              return <div key={totalMin} className={isHalf ? 'half-line' : 'hour-line'} style={{top:totalMin*PXM, zIndex:2}} />;
            })}

            {sched.length === 0 && <div className="day-empty">Выходной день — приёмов нет</div>}

            {dayAppts.map(a => {
              const startMin = timeToMin(a.timeStart);
              const endMin = startMin + (a.duration || 30);
              const pat = patients[a.patId];
              const c = clinics[a.clinicId];
              const cls = 'appt s-' + (a.status === 0 ? 'planned' : a.status === 1 ? 'done' : 'cancelled');
              const dur = endMin - startMin;
              return (
                <div key={a.id} className={cls} style={{top: startMin*PXM + 1, height: dur*PXM - 2, zIndex:3}}
                  onClick={(e) => { e.stopPropagation(); onApptClick(a); }}>
                  <div className="pname">{pat ? shortName(pat) : 'Пациент #' + a.patId}</div>
                  <div className="ptime">{a.timeStart}–{minToTime(endMin)}</div>
                  {dur >= 40 && c && <div className="pdetail">каб. № {c.room}</div>}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

function MbAppointmentsView({ today, clinics, myClinics, patients, appts, onApptClick }) {
  const [search, setSearch] = useState('');
  const [statusFilter, setStatusFilter] = useState('all');
  const [clinicFilter, setClinicFilter] = useState('all');

  const filtered = useMemo(() => {
    return appts
      .filter(a => {
        if (statusFilter === 'upcoming' && !(a.status === 0 && a.date >= today)) return false;
        if (statusFilter === 'done' && a.status !== 1) return false;
        if (statusFilter === 'cancelled' && a.status !== 2) return false;
        if (clinicFilter !== 'all' && String(a.clinicId) !== clinicFilter) return false;
        if (search) {
          const p = patients[a.patId];
          if (!p) return false;
          const haystack = (fullName(p) + ' ' + (p.insurance||'') + ' ' + (p.phone||'')).toLowerCase();
          if (!haystack.includes(search.toLowerCase())) return false;
        }
        return true;
      })
      .sort((a,b) => (b.date + b.timeStart).localeCompare(a.date + a.timeStart));
  }, [appts, search, statusFilter, clinicFilter, patients, today]);

  const counts = {
    total: appts.length,
    upcoming: appts.filter(a => a.status === 0 && a.date >= today).length,
    done: appts.filter(a => a.status === 1).length,
    cancelled: appts.filter(a => a.status === 2).length,
  };

  const STATUS_CHIPS = [
    { id:'all', label:'Все' },
    { id:'upcoming', label:'Предстоящие' },
    { id:'done', label:'Завершённые' },
    { id:'cancelled', label:'Отменённые' },
  ];

  const groups = useMemo(() => {
    const map = new Map();
    filtered.forEach(a => { if (!map.has(a.date)) map.set(a.date, []); map.get(a.date).push(a); });
    return [...map.entries()];
  }, [filtered]);

  return (
    <div className="scroll">
      <div className="pad">
        <div className="page-head">
          <h1>Мои записи</h1>
          <div className="page-sub">История приёмов · всего {appts.length}</div>
        </div>

        <div className="stat-grid">
          <div className="stat highlight"><span className="label">Предстоящие</span><div className="num">{counts.upcoming}</div><div className="sub">запланировано</div></div>
          <div className="stat"><span className="label">Завершено</span><div className="num">{counts.done}</div><div className="sub">приёмов</div></div>
          <div className="stat"><span className="label">Отменено</span><div className="num">{counts.cancelled}</div><div className="sub">пропущено</div></div>
          <div className="stat"><span className="label">Всего</span><div className="num">{counts.total}</div><div className="sub">за всё время</div></div>
        </div>

        <div className="search" style={{marginBottom:11}}>
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
          <input placeholder="Поиск по ФИО, полису, телефону…" value={search} onChange={e => setSearch(e.target.value)} />
        </div>

        <div className="chip-row" style={{marginBottom:9}}>
          {STATUS_CHIPS.map(s => (
            <button key={s.id} className={`chip${statusFilter===s.id?' on':''}`} onClick={() => setStatusFilter(s.id)}>{s.label}</button>
          ))}
        </div>
        {myClinics.length > 1 && (
          <div className="chip-row" style={{marginBottom:14}}>
            <button className={`chip${clinicFilter==='all'?' on':''}`} onClick={() => setClinicFilter('all')}>Все клиники</button>
            {myClinics.map(c => (
              <button key={c.id} className={`chip${clinicFilter===String(c.id)?' on':''}`} onClick={() => setClinicFilter(String(c.id))}>{c.name.split(',')[0]}</button>
            ))}
          </div>
        )}

        {filtered.length === 0
          ? <div className="empty">Записей не найдено</div>
          : groups.map(([gdate, rows]) => (
            <div key={gdate}>
              <div className="list-date-label">{fmtDateLong(gdate)}</div>
              <div className="list-stack">
                {rows.map(a => {
                  const pat = patients[a.patId];
                  const c = clinics[a.clinicId];
                  const endMin = timeToMin(a.timeStart) + (a.duration || 30);
                  const rail = a.status === 1 ? 'var(--info)' : a.status === 2 ? 'var(--danger)' : (c ? `var(${c.colorVar})` : 'var(--accent)');
                  const tag = a.status === 0 ? <span className="tag ok dot">Запланирована</span>
                            : a.status === 1 ? <span className="tag info dot">Завершена</span>
                            : <span className="tag err dot">Отменена</span>;
                  return (
                    <div key={a.id} className="appt-card" onClick={() => onApptClick(a)}>
                      <div className="ac-rail" style={{background:rail}}></div>
                      <div className="ac-body">
                        <div className="ac-top">
                          <span className="ac-time mono">{a.timeStart}–{minToTime(endMin)}</span>
                          {tag}
                        </div>
                        <div className="ac-name" style={a.status===2?{textDecoration:'line-through', color:'var(--ink-3)'}:null}>
                          {pat ? fullName(pat) : 'Пациент #' + a.patId}
                        </div>
                        <div className="ac-meta">
                          {pat && <span className="mono">{pat.dob} · {pat.gender}</span>}
                          {c && <span className="ac-clinic"><span className="cd" style={{background:`var(${c.colorVar})`}}></span>{c.name.split(',')[0]} · каб. {c.room}</span>}
                        </div>
                        {a.note && <div className="ac-note">{a.note}</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          ))
        }
      </div>
    </div>
  );
}

function MbScheduleView({ today, schedule, clinics, myClinics }) {
  const [weekStart, setWeekStart] = useState(getMondayIso(today));
  useEffect(() => { setWeekStart(getMondayIso(today)); }, [today]);

  const weekDates = Array.from({length:7}, (_, i) => addDays(weekStart, i));
  const totalHours = schedule.reduce((sum, s) => sum + (timeToMin(s.timeTo) - timeToMin(s.timeFrom))/60, 0);

  const byDow = {};
  schedule.forEach(s => { if (!byDow[s.dayOfWeek]) byDow[s.dayOfWeek] = []; byDow[s.dayOfWeek].push(s); });
  Object.values(byDow).forEach(arr => arr.sort((a,b) => timeToMin(a.timeFrom) - timeToMin(b.timeFrom)));

  return (
    <div className="scroll">
      <div className="pad">
        <div className="page-head">
          <h1>Моё расписание</h1>
          <div className="page-sub">Постоянное · {totalHours} ч в неделю</div>
        </div>

        <div className="stat-grid" style={{gridTemplateColumns:'repeat(3, 1fr)'}}>
          <div className="stat highlight"><span className="label">Часов</span><div className="num">{totalHours}</div><div className="sub">в неделю</div></div>
          <div className="stat"><span className="label">Клиник</span><div className="num">{myClinics.length}</div><div className="sub">в графике</div></div>
          <div className="stat"><span className="label">Слот</span><div className="num">{schedule[0]?.slotDuration || 30}<span style={{fontSize:13, color:'var(--ink-3)'}}> мин</span></div><div className="sub">приём</div></div>
        </div>

        <div className="chip-row" style={{marginBottom:14, alignItems:'center'}}>
          <button className="chip" onClick={() => setWeekStart(addDays(weekStart,-7))}>← Пред.</button>
          <button className="chip" onClick={() => setWeekStart(getMondayIso(today))}>Текущая</button>
          <button className="chip" onClick={() => setWeekStart(addDays(weekStart,7))}>След. →</button>
          <span style={{marginLeft:'auto', fontSize:12, color:'var(--ink-3)', whiteSpace:'nowrap', alignSelf:'center'}}>{fmtDateShort(weekStart)} – {fmtDateShort(addDays(weekStart,6))}</span>
        </div>

        {weekDates.map((d, i) => {
          const dt = new Date(d+'T00:00:00');
          const dow = i + 1;
          const shifts = byDow[dow] || [];
          const isToday = d === today;
          return (
            <div key={d} className="sched-day">
              <div className={`sched-day-head${isToday?' today':''}`}>
                <span className="sd-dow">{DOW_FULL[dt.getDay()]}</span>
                <span className="sd-date mono">{dt.getDate()} {MONTH_SHORT[dt.getMonth()]}</span>
                {isToday && <span className="tag ok" style={{fontSize:10, padding:'1px 7px'}}>Сегодня</span>}
                {shifts.length > 0 && <span className="sd-count">{shifts.length} {plural(shifts.length,'смена','смены','смен')}</span>}
              </div>
              {shifts.length === 0
                ? <div className="sched-day-body off">Выходной</div>
                : (
                  <div className="sched-day-body">
                    {shifts.map(s => {
                      const c = clinics[s.clinicId];
                      const hours = (timeToMin(s.timeTo) - timeToMin(s.timeFrom))/60;
                      const colorVar = c ? c.colorVar : '--accent';
                      return (
                        <div key={s.id} className="shift" style={{'--rail':`var(${colorVar})`}}>
                          <span className="s-time" style={{color:`var(${colorVar})`}}>{s.timeFrom}<br/>{s.timeTo}</span>
                          <div style={{flex:1, minWidth:0}}>
                            <div className="s-clinic">{c ? c.name : '—'}</div>
                            <div className="s-room">каб. № {s.room} · {hours} ч</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )
              }
            </div>
          );
        })}

        <div className="card" style={{marginTop:6}}>
          <div className="card-head"><h3>Мои клиники</h3></div>
          <div className="clinic-legend">
            {myClinics.map(c => {
              const myShifts = schedule.filter(s => s.clinicId === c.id);
              const hrs = myShifts.reduce((sum,s) => sum + (timeToMin(s.timeTo) - timeToMin(s.timeFrom))/60, 0);
              return (
                <div key={c.id} className="cl-item" style={{background:`var(${c.tintVar})`, borderLeftColor:`var(${c.colorVar})`}}>
                  <div className="cl-name" style={{color:`var(${c.colorVar})`}}>{c.name}</div>
                  <div className="cl-addr">{c.address}</div>
                  <div className="cl-meta">
                    <span><b className="mono">{myShifts.length}</b> {plural(myShifts.length,'смена','смены','смен')}</span>
                    <span><b className="mono">{hrs} ч</b> в неделю</span>
                    <span className="mono" style={{color:'var(--ink-3)'}}>каб. № {c.room}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

function useEsc(onClose) {
  useEffect(() => {
    const h = (e) => e.key === 'Escape' && onClose();
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);
}

function MbProfileSheet({ doctor, myClinics, theme, loading, onToggleTheme, onLogout, onClose }) {
  useEsc(onClose);
  return (
    <div className="sheet-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="sheet">
        <div className="sheet-grip"></div>
        <div className="sheet-head">
          <div style={{flex:1}}><div className="sheet-title">Профиль</div></div>
          <button className="icon-btn" onClick={onClose}>{IcoClose}</button>
        </div>
        <div className="sheet-body">
          <div className="profile-card">
            <div className="doc-avatar">{doctor?.initials || '??'}</div>
            <div style={{minWidth:0}}>
              <div className="pc-name">{doctor?.name || (loading ? 'Загрузка…' : 'Врач не найден')}</div>
              <div className="pc-role">{doctor ? (doctor.specialty || 'Специальность не указана') : ''}{doctor ? ` · ID ${doctor.id}` : ''}</div>
            </div>
          </div>

          <div className="sect-label">Я работаю в</div>
          {myClinics.length === 0
            ? <div style={{fontSize:13, color:'var(--ink-3)', padding:'4px 2px'}}>Нет назначенных клиник</div>
            : myClinics.map(c => (
              <div key={c.id} className="clinic-row">
                <div className="cdot" style={{background:`var(${c.colorVar})`}}></div>
                <div style={{minWidth:0, flex:1}}>
                  <div className="cn">{c.name}</div>
                  <div className="ca">{c.address}</div>
                  <div className="cr mono">каб. № {c.room}</div>
                </div>
              </div>
            ))
          }

          <div className="pref-row" style={{marginTop:8}}>
            <span className="pr-label">Тема оформления</span>
            <button className="theme-toggle pr-tail" onClick={onToggleTheme}>
              <span className="tgl"></span>
              <span>{theme==='dark'?'Тёмная':'Светлая'}</span>
            </button>
          </div>

          <div className="logout-row" onClick={onLogout}>
            <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            <span>Выйти из аккаунта</span>
          </div>
        </div>
      </div>
    </div>
  );
}

function MbApptSheet({ appt, today, clinics, patients, onClose, onSave, onShowPatient }) {
  const [status, setStatus] = useState(appt.status);
  const [note, setNote] = useState(appt.note || '');
  const dirty = status !== appt.status || note !== (appt.note || '');
  useEsc(onClose);

  const pat = patients[appt.patId];
  const c = clinics[appt.clinicId];
  const endMin = timeToMin(appt.timeStart) + (appt.duration || 30);

  const STATUSES = [
    { v:0, label:'Запланирована', cls:'ok' },
    { v:1, label:'Завершена', cls:'info' },
    { v:2, label:'Отменена', cls:'err' },
  ];

  return (
    <div className="sheet-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="sheet">
        <div className="sheet-grip"></div>
        <div className="sheet-head">
          <div style={{flex:1}}>
            <div className="sheet-title">Запись на приём</div>
            <div className="sheet-sub">{fmtDateLong(appt.date)} · {appt.timeStart}–{minToTime(endMin)}</div>
          </div>
          <button className="icon-btn" onClick={onClose}>{IcoClose}</button>
        </div>
        <div className="sheet-body">
          <div className="field">
            <label>Пациент</label>
            <div className="info-box soft">
              <div className="av">{pat ? initials(pat) : '??'}</div>
              <div style={{flex:1, minWidth:0}}>
                <div style={{fontWeight:600, fontSize:15}}>
                  {pat ? <span className="patient-link" onClick={() => onShowPatient(pat.id)}>{fullName(pat)}</span> : ('Пациент #' + appt.patId)}
                </div>
                {pat && <div className="info-line mono">{pat.dob} · {pat.gender} · ОМС {pat.insurance}</div>}
              </div>
            </div>
          </div>

          <div className="field">
            <label>Клиника и кабинет</label>
            <div className="info-box">
              {c && <span style={{width:11, height:11, borderRadius:3, background:`var(${c.colorVar})`, flexShrink:0}}></span>}
              <div style={{flex:1, minWidth:0}}>
                <div style={{fontWeight:500}}>{c?.name || '—'}</div>
                {c && <div className="info-line">{c.address}</div>}
              </div>
              {c && <span className="mono" style={{fontSize:12, padding:'3px 9px', background:'var(--bg-soft)', borderRadius:6, color:'var(--ink-3)', whiteSpace:'nowrap'}}>каб. {c.room}</span>}
            </div>
          </div>

          <div className="field">
            <label>Статус записи</label>
            <div className="seg">
              {STATUSES.map(s => (
                <button key={s.v} className={`${status===s.v?'on '+s.cls:''}`} onClick={() => setStatus(s.v)}>{s.label}</button>
              ))}
            </div>
          </div>

          <div className="field">
            <label>Заметка к приёму</label>
            <textarea className="input-el" rows={5} value={note} onChange={e => setNote(e.target.value)} placeholder="Жалобы, осмотр, диагноз, рекомендации, назначения…" />
          </div>
        </div>
        <div className="sheet-foot">
          <button className="btn ghost" onClick={onClose}>Закрыть</button>
          <button className="btn primary" disabled={!dirty} onClick={() => onSave({status, note})}>Сохранить</button>
        </div>
      </div>
    </div>
  );
}

function MbPatientSheet({ patient, today, clinics, appts, onClose }) {
  useEsc(onClose);
  const sorted = appts.slice().sort((a,b) => (b.date+b.timeStart).localeCompare(a.date+a.timeStart));

  return (
    <div className="sheet-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="sheet">
        <div className="sheet-grip"></div>
        <div className="p-header">
          <div className="p-avatar">{initials(patient)}</div>
          <div style={{flex:1, minWidth:0}}>
            <div className="p-name">{fullName(patient)}</div>
            <div className="p-meta">{patient.gender} · {calcAge(patient.dob, today)} лет · {patient.dob}</div>
          </div>
          <button className="icon-btn" onClick={onClose} style={{color:'var(--ink-2)'}}>{IcoClose}</button>
        </div>
        <div className="sheet-body">
          <div className="info-grid">
            <div className="info-item"><div className="ilabel">Телефон</div><div className="ival mono">{patient.phone}</div></div>
            <div className="info-item"><div className="ilabel">Полис ОМС</div><div className="ival mono">{patient.insurance}</div></div>
          </div>

          <div style={{display:'flex', alignItems:'baseline', gap:10, marginTop:6, marginBottom:12}}>
            <div style={{fontSize:14, fontWeight:600}}>История посещений</div>
            <div style={{fontSize:12, color:'var(--ink-3)'}}>всего {sorted.length}</div>
          </div>

          {sorted.length === 0
            ? <div className="empty" style={{padding:20}}>Нет посещений</div>
            : (
              <div className="timeline">
                {sorted.map(a => {
                  const c = clinics[a.clinicId];
                  const endMin = timeToMin(a.timeStart) + (a.duration || 30);
                  const tag = a.status === 0 ? <span className="tag ok" style={{fontSize:10}}>Запланирована</span>
                            : a.status === 1 ? <span className="tag info" style={{fontSize:10}}>Завершена</span>
                            : <span className="tag err" style={{fontSize:10}}>Отменена</span>;
                  return (
                    <div key={a.id} className="tl-item">
                      <div className="tl-date"><span>{fmtIso(a.date)} · {a.timeStart}–{minToTime(endMin)}</span>{tag}</div>
                      <div className="tl-title">
                        {c && <span style={{width:8, height:8, borderRadius:2, background:`var(${c.colorVar})`, flexShrink:0}}></span>}
                        {c ? `${c.name} · каб. № ${c.room}` : '—'}
                      </div>
                      {a.note && <div className="tl-note">{a.note}</div>}
                    </div>
                  );
                })}
              </div>
            )
          }
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
