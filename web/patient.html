            </div>
          </div>
          <div className="il-row">
            <div className="il-ico">{I.phone}</div>
            <div className="il-main">
              <div className="il-label">Телефон</div>
              <div className="il-val mono">{phone}</div>
            </div>
          </div>
          <div className="il-row">
            <div className="il-ico">{I.pin}</div>
            <div className="il-main">
              <div className="il-label">Прикреплён к клинике</div>
              <div className="il-val">{clinic?.name || '—'}</div>
              {clinic?.address && <div style={{fontSize:12, color:'var(--ink-3)', marginTop:2}}>{clinic.address}</div>}
            </div>
          </div>
        </div>
      </div>

      <div className="section-head"><h3>Статистика</h3></div>
      <div className="quick-grid">
        <div className="quick ac1" style={{cursor:'default', minHeight:'unset'}}>
          <div className="q-title mono" style={{fontSize: 22}}>{stats.upcoming}</div>
          <div className="q-sub">Предстоящие</div>
        </div>
        <div className="quick ac2" style={{cursor:'default', minHeight:'unset'}}>
          <div className="q-title mono" style={{fontSize: 22}}>{stats.done}</div>
          <div className="q-sub">Завершено</div>
        </div>
      </div>

      <div className="section-head"><h3>Настройки</h3></div>
      <div className="menu-list">
        <button className="ml-row" onClick={onToggleTheme}>
          <div className="ml-ico">{I.moon}</div>
          <div style={{flex:1}}>
            <div>Тема оформления</div>
            <div style={{fontSize:12, color:'var(--ink-3)', marginTop:1}}>{theme === 'dark' ? 'Тёмная' : 'Светлая'}</div>
          </div>
          <div className="ml-arrow">{I.chev}</div>
        </button>
        <button className="ml-row danger" onClick={onLogout}>
          <div className="ml-ico">{I.logout}</div>
          <div style={{flex:1}}>Выйти из аккаунта</div>
        </button>
      </div>

      <div style={{textAlign:'center', color:'var(--ink-4)', fontSize:11, padding:'18px 0 8px'}} className="mono">
        MedFlow Patient · v1.0.0
      </div>
    </div>
  );
}

// =============================================================================
// SHEETS
// =============================================================================
function ApptDetailSheet({ appt, onClose, onCancel }) {
  if (!appt) return null;
  const { date, time } = parseScheduled(appt.scheduledAt);
  const doc = findDoctor(appt.doctorId);
  const spec = doc ? findSpec(doc.specialization_id) : null;
  const clinic = findClinic(appt.clinicId);

  const upcoming = appt.status === 0 && appt.scheduledAt >= `${TODAY} ${NOW}`;
  const done = appt.status === 1;
  const cancelled = appt.status === 2;

  useEffect(() => {
    const h = (e) => e.key === 'Escape' && onClose();
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  return (
    <div className="sheet-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="sheet">
        <div className="sheet-grab" />
        <div style={{display:'flex', alignItems:'center', gap:10, marginBottom: 14}}>
          {upcoming  && <span className="tag ok dot">Запланирована</span>}
          {done      && <span className="tag info dot">Завершена</span>}
          {cancelled && <span className="tag err dot">Отменена</span>}
          <span style={{marginLeft:'auto', fontSize:11, color:'var(--ink-3)'}} className="mono">№ {appt.id}</span>
        </div>

        <h3>{fmtDateLong(date)}</h3>
        <div className="sh-sub mono">{time} · 30 мин</div>

        <div className="summary">
          <div className="summary-row">
            <div className="sr-ico">{I.stetho}</div>
            <div>
              <div className="sr-label">Врач</div>
              <div className="sr-val">{doc ? fullName(doc) : '—'}</div>
              <div className="sr-sub">{spec?.name}</div>
            </div>
          </div>
          {clinic && (
            <div className="summary-row">
              <div className="sr-ico">{I.pin}</div>
              <div>
                <div className="sr-label">Клиника</div>
                <div className="sr-val">{clinic.name}</div>
                {clinic.address && <div className="sr-sub">{clinic.address}</div>}
              </div>
            </div>
          )}
          {clinic?.phone && cleanField(clinic.phone, 'Phone_Unknown') && (
            <div className="summary-row">
              <div className="sr-ico">{I.phone}</div>
              <div>
                <div className="sr-label">Регистратура</div>
                <div className="sr-val mono">{clinic.phone}</div>
              </div>
            </div>
          )}
        </div>

        {done && appt.notes && (
          <>
            <div className="section-head" style={{marginTop:18}}>
              <h3 style={{textTransform:'none', letterSpacing:0, fontSize:14, color:'var(--ink)'}}>Заключение врача</h3>
            </div>
            <div style={{background:'var(--bg-soft)', padding:'14px', borderRadius:'var(--radius)', fontSize:13.5, lineHeight:1.5, color:'var(--ink-2)', border:'1px solid var(--line-soft)'}}>
              {appt.notes}
            </div>
          </>
        )}

        {done && !appt.notes && (
          <div style={{padding:'14px', textAlign:'center', color:'var(--ink-3)', fontSize:13}}>
            Заметок к этому приёму нет
          </div>
        )}

        <div className="sh-actions">
          <button className="btn ghost block" onClick={onClose}>Закрыть</button>
          {upcoming && (
            <button className="btn danger block" onClick={() => onCancel(appt.id)}>Отменить запись</button>
          )}
        </div>
      </div>
    </div>
  );
}

function ConfirmSheet({ title, subtitle, confirmLabel, danger, onClose, onConfirm }) {
  useEffect(() => {
    const h = (e) => e.key === 'Escape' && onClose();
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  return (
    <div className="sheet-backdrop" onClick={e => e.target === e.currentTarget && onClose()} style={{zIndex:150}}>
      <div className="sheet">
        <div className="sheet-grab" />
        <h3>{title}</h3>
        <div className="sh-sub">{subtitle}</div>
        <div className="sh-actions">
          <button className="btn ghost block" onClick={onClose}>Отмена</button>
          <button className={`btn ${danger?'danger':'primary'} block`} onClick={onConfirm}>{confirmLabel}</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
